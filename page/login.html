<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="../assets/css/commom.css">
    <link rel="stylesheet" href="../assets/css/auth.css"
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <a href="../index.html">
                <img src="../assets/images/panda_logo_L.svg" alt="로고">
            </a>
        </div>
        <div class="login-wrap">
            <form class="login-box" action="/login" method="POST"> 
                <div class="input-box">
                    <div class="email">
                        <label for="user-email">이메일</label>
                        <input type="email" id="user-email" placeholder="codeit@email.com">
                    </div>
                    <div class="password-box">
                        <label for="user-password">비밀번호</label>
                        <div class="password-input">
                            <input type="password" id="user-password" placeholder="비밀번호">
                            <button type="button" class="password-toggle-icon" id="passwordToggle" aria-label="비밀번호 보이기/숨기기">
                                <img src="../assets/images/eye.svg" alt="비밀번호 아이콘">
                            </button>    
                        </div>
                    </div>
                </div>
                <button type="submit" class="login-button">로그인</button>
            </form>
            <div class="login-option">
                <h1>간편 로그인하기</h1>
                <div class="login-option-button">
                    <a href="https://www.google.com/">
                        <img src="../assets/images/google_lg.svg" alt="구글">
                    </a>
                    <a href="https://www.kakaocorp.com/page/">
                        <img src="../assets/images/kakao_lg.svg" alt="카카오">
                    </a>
                </div>
            </div>
            <p class="signup">판다마켓이 처음이신가요? <a href="../page/signup.html">회원가입</a></p>
        </div>
    </div>
</body>
</html>
