<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../assets/css/commom.css">
    <link rel="stylesheet" href="../assets/css/signup.css">
</head>
<body>
    <div>
        <div class="logo">
            <a href="../index.html">
                <img src="../assets/images/panda_logo_L.svg" alt="로고">
            </a>
        </div>
        <form class="signup-wrap" action="/signup" method="POST">
            <div class="signup-box">
                <div class="email">
                    <label for="user-email">이메일</label>
                    <input type="email" id="user-email" placeholder="codeit@email.com">
                </div>
                <div class="name">
                    <label for="user-nickname">닉네임</label>
                    <input type="text" id="user-nickname" placeholder="판다">
                </div>
                <div class="password">
                    <label for="user-password">비밀번호</label>
                    <input type="password" id="user-password" placeholder="비밀번호">
                </div>
                <div class="password-repeat">
                    <label for="user-password-repeat">비밀번호확인</label>
                    <input type="password" id="user-password-repeat" placeholder="비밀번호">
                </div>
            </div>
            <button type="submit" class="signup-button">회원가입</button>
        </form>
        <div class="login-option-box">
            <div class="login-option">
                <h3>간편 로그인하기</h3>
                <button><img src="../assets/images/google_lg.svg" alt="구글"></button>
                <button><img src="../assets/images/kakao_lg.svg" alt="카카오"></button>
            </div>
        </div>
        <p class="signup">이미 회원이신가요? <a href="../page/login.html">로그인</a></p>
    </div>
</body>
</html>
