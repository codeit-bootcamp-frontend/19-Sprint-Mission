<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../assets/css/commom.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <a href="../index.html">
                <img src="../assets/images/panda_logo_L.svg" alt="로고">
            </a>
        </div>
        <div class="logo-s">
            <a href="../index.html">
                <img src="../assets/images/panda_logo_M.svg" alt="로고">
            </a>
        </div>
        <div class="signup-wrap">
            <form class="signup-box" id="signupForm">
                <div class="input-box">
                    <div class="email">
                        <label for="user-email">이메일</label>
                        <input type="email" id="user-email" placeholder="codeit@email.com">
                        <p id="email-error" class="error-message"></p>
                    </div>
                    <div class="name">
                        <label for="user-nickname">닉네임</label>
                        <input type="text" id="user-nickname" placeholder="판다">
                        <p id="nickname-error" class="error-message"></p>
                    </div>
                    <div class="password-box">
                        <label for="password">비밀번호</label>
                        <div class="password-input">
                            <input type="password" id="password" placeholder="비밀번호">
                            <button type="button" class="password-toggle-icon" id="passwordToggle1" aria-label="비밀번호 보이기/숨기기">
                                <img src="../assets/images/eye.svg" alt="비밀번호 아이콘">
                            </button>
                        </div>
                        <p id="password-error" class="error-message"></p>
                    </div>
                    <div class="password-repeat-box">
                        <label for="password-repeat">비밀번호확인</label>
                        <div class="password-input">
                            <input type="password" id="password-repeat" placeholder="비밀번호">
                            <button type="button" class="password-toggle-icon" id="passwordToggle2" aria-label="비밀번호 보이기/숨기기">
                                <img src="../assets/images/eye.svg" alt="비밀번호 아이콘">
                            </button>
                        </div>
                        <p id="password-repeat-error" class="error-message"></p>
                    </div>
                </div>
                <button type="submit" class="signup-button" disabled>회원가입</button>
            </form>
            <div class="login-option">
                <span>간편 로그인하기</span>
                <div class="login-option-button">
                    <a href="https://www.google.com/">
                        <img src="../assets/images/google_lg.svg" alt="구글">
                    </a>
                    <a href="https://www.kakaocorp.com/page/">
                        <img src="../assets/images/kakao_lg.svg" alt="카카오">
                    </a>
                </div>
            </div>
            <p class="signup">이미 회원이신가요? <a href="../page/login.html">로그인</a></p>
        </div>
    </div>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
