<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../assets/css/commom.css">
    <link rel="stylesheet" href="../assets/css/signup.css">
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <a href="../index.html">
                <img src="../assets/images/panda_logo_L.svg" alt="로고">
            </a>
        </div>
        <div class="signup-wrap">
            <form class="signup-box" action="/signup" method="POST">
                <div class="input-box">
                    <div class="email">
                        <label for="email">이메일</label>
                        <input type="email" id="user-email" placeholder="codeit@email.com">
                    </div>
                    <div class="name">
                        <label for="nickname">닉네임</label>
                        <input type="text" id="user-nickname" placeholder="판다">
                    </div>
                    <div class="password-box">
                        <label for="password">비밀번호</label>
                        <div class="password-input">
                            <input type="password" id="password" placeholder="비밀번호">
                            <img src="../assets/images/eye.svg" alt="비밀번호 보이기/숨기기" class="password-toggle-icon" id="passwordToggle">
                        </div>
                    </div>
                    <div class="password-repeat-box">
                        <label for="password-repeat">비밀번호확인</label>
                        <div class="password-input">
                            <input type="password" id="password-repeat" placeholder="비밀번호">
                            <img src="../assets/images/eye.svg" alt="비밀번호 보이기/숨기기" class="password-toggle-icon" id="passwordToggle">
                        </div>
                    </div>
                </div>
                <button type="submit" class="signup-button">회원가입</button>
            </form>
            <div class="login-option">
                <h3>간편 로그인하기</h3>
                <div class="login-option-button">
                    <a href="https://www.google.com/">
                        <img src="../assets/images/google_lg.svg" alt="구글">
                    </a>
                    <a href="https://www.kakaocorp.com/page/">
                        <img src="../assets/images/kakao_lg.svg" alt="카카오">
                    </a>
                </div>
            </div>
            <p class="signup">이미 회원이신가요? <a href="../page/login.html">로그인</a></p>
        </div>
    </div>
</body>
</html>
