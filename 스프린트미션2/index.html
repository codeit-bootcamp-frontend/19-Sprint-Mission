<html lang="ko">

    <form action="login" method="post">
        <a href="../스프린트미션/index.html" class="logo_area">

            <h1>판다마켓</h1>

        <main>
            <div class="id_area">

            <div class="password_area">
                <label for="password">비밀번호</label>
                <div class="password_box">
                    <input type="password" id="password" name="password" required>
                    <div class="password_icon_img">
                        <img class="security" src="./eyes_icon.png" alt="안보이는 아이콘">
                        <img class="public" src="./eyes_icon2.png" alt="보이는 ~아이콘">
                    </div>
                    
                </div>
                
            </div>
        </main>
            <button type="sbubmit" class="login_btn">로그인</button> 
            

            <div class="social_login">
                <p>간편 로그인하기</p>

                <div class="icon_login">
                    <a href="https://www.google.com"><img src="./google.png" alt=""></a>
                    <a href="https://www.kakao.com"><img src="./kakao.png" alt=""></a>
                </div>
            </div>
        
        <footer>
            <p>판다마켓이 처음이신가요?</p> <a href="../스프린트미션2-2/index.html">회원가입</a>
        </footer>
        
    </form>
