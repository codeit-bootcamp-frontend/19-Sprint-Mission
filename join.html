<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<title>판다마켓</title>

	<link rel="Shortcut Icon" href="img/fav/favicon.ico">
	<link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
	<div class="wrap">
		<main class="formWrap">
			<h1 class="logo"><a href="/"><span class="blind">판다마켓</span></a></h1>

			<form class="authForm">
				<div class="ipt">
					<label for="user-email">이메일</label>
					<input id="user-email" type="email" placeholder="이메일을 입력해 주세요.">
				</div>
				<div class="ipt">
					<label for="user-name">닉네임</label>
					<input id="user-name" type="text" placeholder="닉네임을 입력해 주세요.">
				</div>
				<div class="ipt">
					<label for="user-pw">비밀번호</label>
					<input id="user-pw" type="password" placeholder="비밀번호를 입력해 주세요.">
					<button type="button" class="btnEye"><span class="blind">비밀번호 표시</span></button>
				</div>
				<div class="ipt">
					<label for="user-pw-chk">비밀번호 확인</label>
					<input id="user-pw-chk" type="password" placeholder="비밀번호를 입력해 주세요.">
					<button type="button" class="btnEye on"><span class="blind">비밀번호 숨김</span></button>
				</div>
				<button type="button" class="btn lg">회원가입</button>
			</form>

			<div class="socialBtn">
				<span class="tit">간편 로그인하기</span>
				<div class="btns">
					<a href="https://www.google.com/" target="_blank" rel="noopener noreferrer" title="새창으로 열기"><img src="img/content/btn_google.png" alt="구글 로그인"></a>
					<a href="https://www.kakaocorp.com/page/" target="_blank" rel="noopener noreferrer" title="새창으로 열기"><img src="img/content/btn_kakao.png" alt="카카오톡 로그인"></a>
				</div>
			</div>
			
			<div class="guideBtn">
				<span class="tit">이미 회원이신가요?</span>
				<a href="/login" class="btnTxt">로그인</a>
			</div>
		</main>
	</div>
</body>
</html>
