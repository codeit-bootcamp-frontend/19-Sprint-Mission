<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign-up</title>
    <link rel="stylesheet" href="css/import.css">
    <link rel="stylesheet" href="css/loginpage.css">
</head>
<body>
     <section class="login-area signUp">
        <a href="signup-page.html" class="login-head">
        <img class="login-panda" src="img/판다 얼굴.png" alt="">
        <h1>판다마켓</h1>
        </a>
        <form action="pageitems.html">
            <label for="">이메일</label>
            <div class="email-wrap"></div>
                <input type="email" id="email"  name="email" class="text" placeholder="email">
            </div>
            <label for="" class="Name">닉네임</label>
            <input type="name" id="name"  name="name" class="text push" placeholder="닉네임">
            <label for="">비밀번호</label>
            <div class="password-wrap ">
                <input type="password" id="password" name="password" class="text" placeholder="password">
                <span class="eye-ikon eye-on"></span>
                <span class="eye-ikon eye-off"></span>
            </div>
            <label for="">비밀번호 확인</label>
            <div class="password-wrap">
                <input type="password" id="password-check" name="password" class="text" placeholder="비밀번호 확인">
                <span class="eye-ikon eye-on"></span>
                <span class="eye-ikon eye-off"></span>
            </div>
            <input type="submit" id="submit" class="submit push" value="회원가입">
        </form>
        
        <div class="easy-login">
            <span>간편 로그인하기</span>
            <a href="https://www.google.com/" class="google"></a>
            <a href="https://www.kakaocorp.com/page/" class="kakao"></a>
        </div>
        <p>판다마켓이 처음이신가요?<a href="pagelogin.html" class="sign-up">로그인</a></p>
    </section>
    <script src="js/signup.js"></script>

</body>
</html>
