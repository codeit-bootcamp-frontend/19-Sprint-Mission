<!DOCTYPE html>
<html lang="seo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="signupstyle.css">
</head>
<body>
  <section class="signup_wrap">
    <div class="signup_header">
      <img src="logo1.png" alt="로고이미지">
      <div class="signup_title">
        판다마켓
      </div>

    </div>
    <div class="signup_box">
      <div class="signup_email">
        이메일
      </div>
      <div class="signup_email_box">
        <input type="text">
      </div>
      <div class="signup_name">
        닉네임
      </div>
      <div class="signup_email_box">
        <input type="text">
      </div>
      <div class="signup_password">
        비밀번호
      </div>
      <div class="signup_passwrod_box">
        <input type="password">
      </div>
      <div class="signup_passwrodcheck">
        비밀번호 확인
      </div>
      <div class="signup_passwrodcheck_box">
        <input type="text">
      </div>
      <div class="signup_button">
        회원가입
      </div>
      <div class="signup_easy">
        <div class="signup_easy_word">
          간편 로그인하기
        </div>
        <div>
          <a href="https://www.google.com">
            <img src="logingoogle.png" alt="구글 로그인">
          </a>

          <a href="https://www.kakao.com">
            <img src="loginkakao.png" alt="카카오 로그인">
          </a>
        </div>
      </div>
      <div class="signup_signup">
        이미 회원이신가요?<a href="login.html">로그인</a>

      </div>
    </div>
  </section>
</body>
</html>
