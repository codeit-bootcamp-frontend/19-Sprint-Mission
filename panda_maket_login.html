<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="panda_maket_login.css" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <title>판다마켓_로그인</title>
</head>

<body>

  <!-- //판다마켓 로고// -->

  <header>
    <div class="logo_img">
      <a href="panda_maket_main.html"><img src="img_panda/login_logo.png" alt="판다마켓_로그인"></a>
    </div>
  </header>


  <main>

    <form>

      <!-- 이메일 -->

      <div class="input.email">
        <label for="email">이메일</label>
        <input id="email" name="email" type="email" placeholder="codeit@email.com">
      </div>

      <!-- 비밀번호 -->
      <div class="input.password">
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" placeholder="●●●●●●●">
      </div>

      <!-- 로그인 -->
      <button class="login_button">로그인</button>

    </form>

    <!-- 간편 로그인하기 -->
    <div class="Easy_login">
      <div class="Easy_login_inner">
        <div class="Easy_login_menu">간편 로그인하기</div>
      </div>

      <div class="Easy_login_logo">
        <a href="https://www.google.com/"><img class="herf_logo" src="img_panda/Component 2.png" alt="Google_로고"></a>
        <a href="https://www.kakaocorp.com/page/"><img class="herf_logo" src="img_panda/Component 3.png"
            alt="Kakao_로고"></a>
      </div>
    </div>
    </div>

    <div class="first_time">
      판다마켓이 처음이신가요?
      <a class="sign_up" href="panda_maket_sing_up.html">회원가입</a>
    </div>

  </main>

</body>

</html>
