<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="sign_up.css" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <title>판다마켓_회원가입</title>
</head>

<body>
  <div class="container">
    <div class="login-logo">
      <a href="home.html">
        <img src="img_panda/login_logo.png" alt="판다마켓_로고"></a>
    </div>

    <form class="form">

      <div class="input-eamil">
        <label for="email">이메일</label>
        <input id="email" name="email" type="email" placeholder="codeit@email.com">
      </div>

      <div class="input-nickname">
        <label for="nickname">닉네임</label>
        <input id="nickname" name="nickname" type="text" placeholder="판다">
      </div>

      <div class="input-password">
        <label for="password">비밀번호</label>
        <div class="input-password-box">
          <input id="password" name="password" type="password" placeholder="●●●●●●●">
          <img class="eye-icon" src="img_panda/btn_visibility_on_24px.png" alt="숨김표시">
        </div>
      </div>

      <div class="input-password-check">
        <label for="password">비밀번호 확인</label>
        <div class="input-password-box">
          <input id="password" name="password" type="password" placeholder="asdffff">
          <img class="eye-icon" src="img_panda/btn_visibility_on_24px.png" alt="숨김표시">
        </div>
      </div>


      <button class="sign-up-button">회원가입</button>

    </form>

    <div class="easy-login">

      <div class="easy-login-inner">
        <div class="easy-login-text">간편로그인하기</div>
        <div class="easy-login-logo">
          <a href="https://www.google.com"><img src="img_panda/Component 2.png" alt="google로 이동"></a>
          <a href="https://www.kakaocorp.com/page"><img src="img_panda/Component 3.png" alt="kakao로 이동">
          </a>
        </div>
      </div>

    </div>

    <div class="login-notice">
      이미 회원이신가요? <a class="singup-text" href="login.html">로그인</a>
    </div>
  </div>

</body>

</html>
