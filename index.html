<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="icon" href="./images/favicon.svg" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/index-style.css" />
    <title>판다마켓</title>
  </head>
  <body>
    <header class="header-container">
      <nav class="contents-layout gnb">
        <h1 class="logo">
          <a href="/">
            <picture>
              <source media="(max-width: 767px)" srcset="./images/text-logo.svg" />
              <img src="./images/logo.svg" alt="판다마켓 로고" class="logo-img" />
            </picture>
          </a>
        </h1>
        <a href="/login.html" class="button login">로그인</a>
      </nav>
    </header>
    <main>
      <section class="banner-container">
        <div class="contents-layout banner-contents main-banner-contents">
          <div class="main-banner-text-area">
            <h2 class="banner-title">
              일상의 모든 물건을 <br class="main-banner-title-br" />
              거래해 보세요
            </h2>
            <a href="./items.html" class="button view-more-items">구경하러 가기</a>
          </div>
          <img src="./images/home/Img_home_top.png" alt="판다마켓 메인 배너" class="main-banner-img" />
        </div>
      </section>
      <section class="overview-container">
        <div class="overview-contents">
          <img src="./images/home/Img_home_01.png" alt="판다마켓 소개 이미지1" class="overview-img" />
          <div class="overview-text-area">
            <span class="overview-tag">Hot item</span>
            <h3 class="overview-title">
              인기 상품을 <br class="overview-title-br" />
              확인해 보세요
            </h3>
            <p class="overview-desc">
              가장 HOT한 중고거래 물품을 <br />
              판다 마켓에서 확인해 보세요
            </p>
          </div>
        </div>
        <div class="overview-contents">
          <img src="./images/home/Img_home_02.png" alt="판다마켓 소개 이미지2" class="overview-img" />
          <div class="overview-text-area overview-right">
            <span class="overview-tag">Search</span>
            <h3 class="overview-title">
              구매를 원하는 <br class="overview-title-br" />
              상품을 검색하세요
            </h3>
            <p class="overview-desc">
              구매하고 싶은 물품은 검색해서 <br />
              쉽게 찾아보세요
            </p>
          </div>
        </div>
        <div class="overview-contents">
          <img src="./images/home/Img_home_03.png" alt="판다마켓 소개 이미지3" class="overview-img" />
          <div class="overview-text-area">
            <span class="overview-tag">Register</span>
            <h3 class="overview-title">
              판매를 원하는 <br class="overview-title-br" />
              상품을 등록하세요
            </h3>
            <p class="overview-desc">
              어떤 물건이든 판매하고 싶은 상품을 <br />
              쉽게 등록하세요
            </p>
          </div>
        </div>
      </section>
      <section class="banner-container">
        <div class="contents-layout banner-contents bottom-banner-contents">
          <h4 class="banner-title bottom-banner-title">
            믿을 수 있는 <br />
            판다마켓 중고 거래
          </h4>
          <img src="./images/home/Img_home_bottom.png" alt="판다마켓 하단 배너" class="bottom-banner-img" />
        </div>
      </section>
    </main>
    <footer class="footer-container">
      <div class="contents-layout footer-contents">
        <h5 class="footer-company-info">©codeit - 2024</h5>
        <div class="footer-link-area">
          <a href="/privacy.html" class="footer-link">Privacy Policy</a>
          <a href="/faq.html" class="footer-link">FAQ</a>
        </div>
        <div class="footer-sns-area">
          <a href="https://www.facebook.com/codeit.kr/" target="_blank" rel="noopener noreferrer">
            <img src="./images/icons/ic_facebook.svg" alt="페이스북" />
          </a>
          <a href="https://x.com/" target="_blank" rel="noopener noreferrer">
            <img src="./images/icons/ic_twitter.svg" alt="X(트위터)" />
          </a>
          <a href="https://www.youtube.com/channel/UCCM79CPm2WbBYTRaiNEExbg" target="_blank" rel="noopener noreferrer">
            <img src="./images/icons/ic_youtube.svg" alt="유튜브" />
          </a>
          <a href="https://www.instagram.com/codeit_kr/" target="_blank" rel="noopener noreferrer">
            <img src="./images/icons/ic_instagram.svg" alt="인스타그램" />
          </a>
        </div>
      </div>
    </footer>
  </body>
</html>
