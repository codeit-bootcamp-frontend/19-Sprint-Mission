<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta http-equiv="Cache-Control" content="no-cache"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓</title>
  <link rel="shortcut icon" type="image/x-icon" href="images/logo/favicon.ico">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header>
    <div id="gnb">
      <a href="/" id="panda_market_logo">
        <img src="images/logo/panda-market-logo.png" alt="판다마켓 로고">
      </a>
      <a href="login.html" id="loginButton" class="button">로그인</a>
    </div>
  </header>
  <main>
      <section id="mainTobBanner">
        <div class="wrapper">
          <h1>일상의 모든 물건을<br/>거래해 보세요</h1>
          <a href="items.html" class="button mainBtn">구경하러 가기</a>
        </div>
      </section>
      <section id="main_contents" class="wrapper">
        <div class="main_content">
          <img src="images/main/main-content-01.png" alt="인기상품">
          <div class="txt_content">
            <span class="subTitle">Hot item</span>
            <h2>인기 상품을<br>확인해 보세요</h2>
            <p>가장 HOT한 중고거래 물품을<br>판다마켓에서 확인해 보세요</p>
          </div>
        </div>
        <div class="main_content">
          <div class="txt_content">
            <span class="subTitle">Search</span>
            <h2>구매를 원하는<br>상품을 검색하세요</h2>
            <p>구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요</p> 
          </div>
          <img src="images/main/main-content-02.png" alt="검색하기">
        </div>
        <div class="main_content">
          <img src="images/main/main-content-03.png" alt="판매 상품 등록">
          <div class="txt_content">
            <span class="subTitle">Register</span>
            <h2>판매를 원하는<br>상품을 등록하세요</h2>
            <p>어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</p>
          </div>
        </div>
      </section>
      <div class="background_block"></div>
      <section id="mainBottomBanner">
        <div class="wrapper">
          <h2>믿을 수 있는<br>판다마켓 중고거래</h2>
        </div>
      </section>
  </main>
  <footer>
    <div id="copyright">&copy;codeit - 2024</div>
    <div id="footerMenu">
      <a href="privacy.html">Privacy Policy</a>
      <a href="fag.html">FAQ</a>
    </div>
    <div id="footerSnsIcons">
      <a id="facebookIcon" href="https://www.facebook.com/" target="_blank">
        <img src="images/sns/facebook-icon.svg" alt="페이스북">
      </a>
      <a id="twitterIcon" href="https://x.com/" target="_blank">
        <img src="images/sns/twitter-icon.svg" alt="트위터">
      </a>
      <a id="youtubeIcon" href="https://www.youtube.com/" target="_blank">
        <img src="images/sns/youtube-icon.svg" alt="유튜브">
      </a>
      <a id="instagramIcon" href="https://www.instagram.com/" target="_blank">
        <img src="images/sns/instagram-icon.svg" alt="인스타그램">
      </a>
    </div>
  </footer>
</body>
</html>
