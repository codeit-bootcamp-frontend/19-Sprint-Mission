<body>
	<div class="wrap">
		<!-- header : s -->
		<header class="header">
			<div class="inner">
				<a href="/" class="logo">판다마켓</a>
				<a href="/login" class="btn">로그인</a>
			</div>
		</header>
		<!-- // header : e -->
		<!-- main : s -->
		<main class="main">
			<section class="top">
				<div class="inner">
					<div class="txtCont">
						<h1 class="title">일상의 모든 물건을 <br class="hiddenT">거래해 보세요</h1>
						<a href="/items" class="btn lg">구경하러 가기</a>
					</div>
				</div>
			</section>
			<section class="cont">
				<div class="inner">
					<div class="imgCont"><img src="img/main/img_home_01.png" alt=""></div>
					<div class="txtCont">
						<span class="type">Hot item</span>
						<p class="title">인기 상품을 <br class="hiddenTM">확인해 보세요</p>
						<p class="text">가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요</p>
					</div>
				</div>
			</section>
			<section class="cont reverse">
				<div class="inner">
					<div class="imgCont"><img src="img/main/img_home_02.png" alt=""></div>
					<div class="txtCont">
						<span class="type">Search</span>
						<p class="title">구매를 원하는 <br class="hiddenTM">상품을 검색하세요</p>
						<p class="text">구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요</p>
					</div>
				</div>
			</section>
			<section class="cont">
				<div class="inner">
					<div class="imgCont"><img src="img/main/img_home_03.png" alt=""></div>
					<div class="txtCont">
						<span class="type">Register</span>
						<p class="title">판매를 원하는 <br class="hiddenTM">상품을 등록하세요</p>
						<p class="text">어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</p>
					</div>
				</div>
			</section>
			<section class="btm">
				<div class="inner">
					<p class="title">믿을 수 있는<br>판다마켓 중고 거래</p>
				</div>
			</section>
		</main>
		<!-- // main : e -->
		<!-- footer : s -->
		<footer class="footer">
				<div class="inner">
					<div class="copy">©codeit - 2024</div>
					<div class="link">
						<a href="/privacy">Privacy Policy</a>
						<a href="/faq">FAQ</a>
					</div>
					<div class="sns">
						<a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer"><img src="img/main/ic_facebook.png" alt="facebook"></a>
						<a href="https://twitter.com/" target="_blank" rel="noopener noreferrer"><img src="img/main/ic_twitter.png" alt="twitter"></a>
						<a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer"><img src="img/main/ic_youtube.png" alt="youtube"></a>
						<a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer"><img src="img/main/ic_instagram.png" alt="instagram"></a>
					</div>
				</div>
		</footer>
		<!-- // footer : e -->
