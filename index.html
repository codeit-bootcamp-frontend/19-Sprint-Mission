<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓</title>
  <link rel="stylesheet" href="./css/style.css?=0435">
</head>
<body>
  <!-- header -->
  <header>
    <div class="container1">
      <a class="logo" href="/">
        <img src="./img/logo.png" alt="판다마켓 로고 이미지">
        <img src="./img/logo_txt.png" alt="판다마켓 텍스트">
      </a>
      <div class="right_box">
        <button onclick="location.href='./login.html'">로그인</button>
      </div>
    </div>
  </header><!-- header// -->
  <!-- main -->
  <main>
    <div class="container1">
      <div class="txt_box">
        <h1>일상의 모든 물건을 <br>거래해 보세요</h1>
        <a href="/items" target="_self">구경하러 가기</a>
      </div>
      <div class="img_box">
        <img src="./img/main_img.png" alt="">
      </div>
    </div>
  </main><!-- main// -->
  <!-- section:item -->
  <section class="content item">
    <div class="container2">
      <div class="box">
        <div class="img_box">
          <img src="./img/section1_img.png" alt="">
        </div>
        <div class="txt_box">
          <h4>Hot item</h4>
          <h2>인기 상품을<br>확인해 보세요</h2>
          <p>가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요</p>
        </div>
      </div>
    </div>
  </section><!-- section:item // -->
  <!-- section:Search -->
  <section class="content search">
    <div class="container2">
      <div class="box">
        <div class="img_box">
          <img src="./img/section2_img.png" alt="">
        </div>
        <div class="txt_box">
          <h4>Search</h4>
          <h2>구매를 원하는<br>상품을 검색하세요</h2>
          <p>구매하고 싶은 물품은 검색해서 쉽게 찾아보세요</p>
        </div>
      </div>
    </div>
  </section><!-- section:Search // -->
  <!-- section:register -->
  <section class="content register">
    <div class="container2">
      <div class="box">
        <div class="img_box">
          <img src="./img/section3_img.png" alt="">
        </div>
        <div class="txt_box">
          <h4>Register</h4>
          <h2>판매를 원하는<br>상품을 등록하세요</h2>
          <p>어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</p>
        </div>
      </div>
    </div>
  </section><!-- section:register // -->
  <!-- section:banner -->
  <section class="banner">
    <div class="container1">
      <div class="txt_box">
        <h1>믿을 수 있는<br>판다마켓 중고 거래</h1>
      </div>
      <div class="img_box">
        <img src="./img/bottom_img.png" alt="">
      </div>
    </div>
  </section><!-- section:banner // -->
  <!-- footer -->
  <footer>
    <div class="container1">
      <div>©codeit - 2024</div>
      <div class="menu">
        <a href="/privacy">Privacy Policy</a>
        <a href="/faq">FAQ</a>
      </div>
      <div class="sns">
        <a href="https://www.facebook.com/" target="_blank"><img src="./img/ic_facebook.png" alt="facebook 아이콘"></a>
        <a href="https://x.com/" target="_blank"><img src="./img/ic_twitter.png" alt="twitter 아이콘"></a>
        <a href="https://www.youtube.com/" target="_blank"><img src="./img/ic_youtube.png" alt="youtube 아이콘"></a>
        <a href="https://www.instagram.com/" target="_blank"><img src="./img/ic_instagram.png" alt="instagram 아이콘"></a>
      </div>
    </div>
  </footer><!-- footer // -->
</body>
</html>
