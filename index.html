<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="stylesheet" href="./style.css" />
    <title>판다마켓</title>
  </head>
  <body>
    <header>
      <div class="wrap">
        <a class="logo_box" href="/">
          <img src="./images/logo_1.png" alt="판다마켓 로고 이미지" />
        </a>
        <a class="login_btn" href="./login.html">
          <img src="./images/btn_small_48.png" alt="로그인 버튼 이미지" />
        </a>
      </div>
    </header>

    <main>
      <div class="main_img_box">
        <div class="wrap">
          <div class="text_btn_box">
            <h1>일상의 모든 물건을<br />거래해 보세요</h1>
            <a href="./items.html">구경하러 가기</a>
          </div>
          <div class="img_box">
            <img
              src="./images/Img_home_top.png"
              alt="판다 메인 일러스트 이미지"
            />
          </div>
        </div>
      </div>

      <article class="best_selling_item">
        <div class="img_box">
          <img
            src="./images/Img_home_01.png"
            alt="인기상품 확인해보세요 일러스트 이미지"
          />
        </div>
        <div class="text_box">
          <span>Hot item</span>
          <h1>
            인기상품을<br />
            확인해 보세요
          </h1>
          <p>가장 HOT한 중고거래 물품을<br />판다 마켓에서 확인해 보세요</p>
        </div>
      </article>

      <article class="search_item">
        <div class="text_box">
          <span>Search</span>
          <h1>구매를 원하는<br />상품을 검색하세요</h1>
          <p>구매하고 싶은 물품은 검색해서<br />쉽게 찾아보세요</p>
        </div>
        <div class="img_box">
          <img
            src="./images/Img_home_02.png"
            alt="구매원하는 상품 검색 일러스트 이미지"
          />
        </div>
      </article>

      <article class="register_item">
        <div class="img_box">
          <img
            src="./images/Img_home_03.png"
            alt="판매를 원하는 상품 등록하세요 일러스트 이미지"
          />
        </div>
        <div class="text_box">
          <span>Register</span>
          <h1>판매를 원하는<br />상품을 등록하세요</h1>
          <p>어떤 물건이든 판매하고 싶은 상품을<br />쉽게 등록하세요</p>
        </div>
      </article>

      <div class="main_img_box">
        <div class="wrap">
          <div class="text_btn_box">
            <h1>믿을 수 있는<br />판다마켓 중고 거래</h1>
          </div>
          <div class="img_box">
            <img
              src="./images/Img_home_bottom.png"
              alt="판다 하단 일러스트 이미지"
            />
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="text_icon_box">
        <p>©codeit - 2024</p>
        <div class="center">
          <a href="./privacy.html">Privacy Policy</a>
          <a href="./faq.html">FAQ</a>
        </div>
        <div class="icons">
          <a
            class="facebook"
            href="https://www.facebook.com/?locale=ko_KR"
            target="_blank"
          ></a>
          <a
            class="twitter"
            href="https://www.facebook.com/?locale=ko_KR"
            target="_blank"
          ></a>
          <a
            class="youtube"
            href="https://www.youtube.com/?app=desktop&hl=ko&gl=KR"
            target="_blank"
          ></a>
          <a
            class="instagram"
            href="https://www.instagram.com/"
            target="_blank"
          ></a>
        </div>
      </div>
    </footer>
  </body>
</html>
