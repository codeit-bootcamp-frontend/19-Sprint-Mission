<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판다마켓</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&display=swap">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- header 시작 -->
    <header>
        <nav class="nav-bar">
            <div class="nav-left">
                <a href="/">
                    <img src="./img/logo.png" alt="판다마켓 로고">
                    <span>판다마켓</span>
                </a>
            </div>
            <div class="nav-right">
                <a class="login-button" href='./html/login.html'>로그인</a>
            </div>
        </nav>
    </header>
    <!-- header 끝 -->

    <!-- main 시작 -->
    <main>
        <section class="banner">
            <div class="banner-contents">
                <div class="banner-text">
                    <h2>일상의 모든 물건을 <br> 거래해 보세요</h2>
                    <a class="banner-button" href="./html/items.html">구경하러 가기</a>
                </div>
                <figure>
                    <img class="banner-top-img" src="./img/home_top.png" alt="상단 배너 이미지">
                </figure>
            </div>
        </section>

        <section class="content-sections">
            <div class="content-section">
                <div class="contents">
                    <figure>
                        <img src="./img/home_01.png" class="content-img" alt="홈 이미지01">
                    </figure>
                    <div class="content-texts">
                        <span>Hot item</span>
                        <div class="content-text">
                            <h2 class="text-top">인기 상품을 <br> 확인해 보세요</h2>
                            <p class="text-bottom">가장 HOT한 중고거래 물품을 <br> 판다마켓에서 확인해 보세요</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="content-section">
                <div class="contents">
                    <figure>
                        <img src="./img/home_02.png" class="content-img" alt="홈 이미지02">
                    </figure>
                    <div class="content-texts">
                        <span>Search</span>
                        <div class="content-text">
                            <h2 class="text-top">구매를 원하는 <br> 상품을 검색하세요</h2>
                            <p class="text-bottom">구매하고 싶은 물품은 검색해서 <br> 쉽게 찾아보세요</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="content-section">
                <div class="contents">
                    <figure>
                        <img src="./img/home_03.png" class="content-img" alt="홈 이미지03">
                    </figure>
                    <div class="content-texts">
                        <span>Register</span>
                        <div class="content-text">
                            <h2 class="text-top">판매를 원하는 <br> 상품을 등록하세요</h2>
                            <p class="text-bottom">어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="banner">
            <div class="banner-contents">
                <div class="banner-text">
                    <h2>믿을 수 있는 <br> 판다마켓 중고 거래</h2>
                </div>
                <figure>
                    <img class="banner-bottom-img" src="./img/home_bottom.png" alt="하단 배너 이미지">
                </figure>
            </div>
        </section>
    </main>
    <!-- main 끝 -->

    <!-- footer 시작 -->
    <footer>
        <div class="footer-bar">
            <div class="footer-left">
                <p>&copy;codeit-2024</p>
            </div>
            <div class="footer-mid">
                <a href="/html/privacy.html">Privacy Policy</a>
                <a href="/html/faq.html">FAQ</a>
            </div>
            <div class="footer-right">
                <a href="https://www.facebook.com" target="_blank"><img src="./img/ic_facebook.png" alt="facebook"></a>
                <a href="https://x.com" target="_blank"><img src="./img/ic_twitter.png" alt="twitter"></a>
                <a href="https://www.youtube.com" target="_blank"><img src="./img/ic_youtube.png" alt="youtube"></a>
                <a href="https://www.instagram.com" target="_blank"><img src="./img/ic_instagram.png"
                        alt="instagram"></a>
            </div>
        </div>
    </footer>
    <!-- footer 끝 -->
</body>

</html>
