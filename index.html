<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>판다마켓</title>
  </head>
  <body>
    <header class="headerContainer">
      <nav class="contentsLayout gnb">
        <h1 class="logo">
          <a href="/">
            <img src="./images/logo.svg" alt="판다마켓 로고" class="logoImg" />
          </a>
        </h1>
        <a href="/login.html" class="button login">로그인</a>
      </nav>
    </header>
    <main>
      <section class="bannerContainer">
        <div class="contentsLayout bannerContents mainBannerContents">
          <div class="mainBannerTextArea">
            <h2 class="bannerTitle">
              일상의 모든 물건을 <br />
              거래해 보세요
            </h2>
            <a href="./items.html" class="button viewMoreItems">구경하러 가기</a>
          </div>
          <img src="./images/home/Img_home_top.png" alt="판다마켓 메인 배너" class="mainBannerImg" />
        </div>
      </section>
      <section class="overviewContainer">
        <div class="overviewContents">
          <img src="./images/home/Img_home_01.png" alt="판다마켓 소개 이미지1" class="overviewImg" />
          <div class="overviewTextArea">
            <span class="overviewTag">Hot item</span>
            <h3 class="overviewTitle">
              인기 상품을 <br />
              확인해 보세요
            </h3>
            <p class="overviewDesc">
              가장 HOT한 중고거래 물품을 <br />
              판다 마켓에서 확인해 보세요
            </p>
          </div>
        </div>
        <div class="overviewContents">
          <img src="./images/home/Img_home_02.png" alt="판다마켓 소개 이미지2" class="overviewImg" />
          <div class="overviewTextArea overviewRight">
            <span class="overviewTag">Search</span>
            <h3 class="overviewTitle">
              구매를 원하는 <br />
              상품을 검색하세요
            </h3>
            <p class="overviewDesc">
              구매하고 싶은 물품은 검색해서 <br />
              쉽게 찾아보세요
            </p>
          </div>
        </div>
        <div class="overviewContents">
          <img src="./images/home/Img_home_03.png" alt="판다마켓 소개 이미지3" class="overviewImg" />
          <div class="overviewTextArea">
            <span class="overviewTag">Register</span>
            <h3 class="overviewTitle">
              판매를 원하는 <br />
              상품을 등록하세요
            </h3>
            <p class="overviewDesc">
              어떤 물건이든 판매하고 싶은 상품을 <br />
              쉽게 등록하세요
            </p>
          </div>
        </div>
      </section>
      <section class="bannerContainer">
        <div class="contentsLayout bannerContents bottomBannerContents">
          <h4 class="bannerTitle bottomBannerTitle">
            믿을 수 있는 <br />
            판다마켓 중고 거래
          </h4>
          <img src="./images/home/Img_home_bottom.png" alt="판다마켓 하단 배너" class="bottomBannerImg" />
        </div>
      </section>
    </main>
    <footer class="footerContainer">
      <div class="contentsLayout footerContents">
        <h5 class="footerCompanyInfo">©codeit - 2024</h5>
        <div class="footerLinkArea">
          <a href="/privacy.html" class="footerLink">Privacy Policy</a>
          <a href="/faq.html" class="footerLink">FAQ</a>
        </div>
        <div class="footerSNSArea">
          <a href="https://www.facebook.com/codeit.kr/" target="_blank" rel="noopener noreferrer">
            <img src="./images/icons/ic_facebook.svg" alt="페이스북" />
          </a>
          <a href="https://x.com/" target="_blank" rel="noopener noreferrer">
            <img src="./images/icons/ic_twitter.svg" alt="X(트위터)" />
          </a>
          <a href="https://www.youtube.com/channel/UCCM79CPm2WbBYTRaiNEExbg" target="_blank" rel="noopener noreferrer">
            <img src="./images/icons/ic_youtube.svg" alt="유튜브" />
          </a>
          <a href="https://www.instagram.com/codeit_kr/" target="_blank" rel="noopener noreferrer">
            <img src="./images/icons/ic_instagram.svg" alt="인스타그램" />
          </a>
        </div>
      </div>
    </footer>
  </body>
</html>
