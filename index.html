<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/contents.css" />
  </head>
  <body>
    <header>
      <div class="inner">
        <a href="/" class="btn-logo">
          <h1><img src="img/logo.png" alt="logo" /></h1>
        </a>
        <a href="/items" class="btn-login">로그인</a>
      </div>
    </header>
    <main>
      <section class="section-main">
        <div class="inner">
          <div class="text-box">
            <h2>일상의 모든 물건을<br />거래해 보세요</h2>
            <a href="#">구경하러 가기</a>
          </div>
          <img src="img/Img_home_top.png" alt="img home top" />
        </div>
      </section>
      <section class="section-cont">
        <div class="inner">
          <img src="img/Img_home_01.png" alt="img home 01" />
          <div class="text-box">
            <h3>Hot item</h3>
            <h2>인기 상품을<br />확인해 보세요</h2>
            <p>가장 HOT한 중고거래 물품을 판다 마켓에서 확인해 보세요</p>
          </div>
        </div>
      </section>
      <section class="section-cont">
        <div class="inner">
          <div class="text-box">
            <h3>Search</h3>
            <h2>구매를 원하는<br />상품을 검색하세요</h2>
            <p>구매하고 싶은 물품은 검색해서 쉽게 찾아보세요</p>
          </div>
          <img src="img/Img_home_02.png" alt="img home 02" />
        </div>
      </section>
      <section class="section-cont">
        <div class="inner">
          <img src="img/Img_home_03.png" alt="img home 03" />
          <div class="text-box">
            <h3>Register</h3>
            <h2>판매를 원하는<br />상품을 등록하세요</h2>
            <p>어떤 물건이든 판매하고 싶은 상품을 쉽게 등록하세요</p>
          </div>
        </div>
      </section>
      <section class="section-main">
        <div class="inner">
          <div class="text-box">
            <h2>믿을 수 있는<br />판다마켓 중고 거래</h2>
          </div>
          <img src="img/Img_home_bottom.png" alt="img home bottom" />
        </div>
      </section>
    </main>
    <footer>
      <div class="inner">
        <p>©codeit - 2024</p>
        <div class="footer-center">
          <a href="/privacy">Privacy Policy</a>
          <a href="/faq">FAQ</a>
        </div>
        <div class="footer-sns">
          <a href="https://www.facebook.com" target="_blank"
            ><img src="img/ic_facebook.png" alt="sns"
          /></a>
          <a href="https://www.x.com" target="_blank"
            ><img src="img/ic_twitter.png" alt="sns"
          /></a>
          <a href="https://www.youtube.com" target="_blank"
            ><img src="img/ic_youtube.png" alt="sns"
          /></a>
          <a href="https://www.instagram.com" target="_blank"
            ><img src="img/ic_instagram.png" alt="sns"
          /></a>
        </div>
      </div>
    </footer>
  </body>
</html>
