<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="headerwrapper">
        <img src="logo.png" alt="판다마켓 로고" class="logoimg" />
        <div class="loginbtn">로그인</div>
      </div>
    </header>
    <div class="banner-top">
      <div class="bannerwrapper">
        <div class="banner-top-items">
          <div class="slogan">
            일상의 모든 물건을<br />
            거래해 보세요
          </div>
          <div class="surfbtn">구경하러 가기</div>
        </div>
        <img
          src="banner-top.png"
          alt="상단 배너 이미지"
          class="banner-top-img"
        />
      </div>
    </div>
    <div class="hot_item">
      <div class="hot_item-wrapper">
        <img src="hot_item.png" alt="인기 상품 이미지" class="hot_item-img" />
        <div class="hot_item-texts">
          <div class="title_en">Hot item</div>
          <div class="title_ko">
            <div class="title_ko-big">
              인기 상품을<br />
              확인해 보세요
            </div>
            <div class="title_ko-small">
              가장 HOT한 중고거래 물품을 판다 마켓에서 확인해 보세요
            </div>
          </div>
        </div>
      </div>
    </div>
    <div></div>
    <div></div>

  </body>
</html>
