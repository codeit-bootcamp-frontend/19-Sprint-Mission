<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판다마켓</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
</head>
<body>
    <header>
        <span id="header-items">
            <a href="index.html">
                <img  id="logo" src="images/Property 1=lg.png" alt="logo">
            </a>
            <a class="button login-button" href="login/" alt="link to login">로그인</a>
        </span>
    </header>
    <main>
        <section id="landing-page">
            <div id="landing-contents">
                <div id="landing-description">
                    <h2 id="landing-title">일상의 모든 물건을<br/>거래해 보세요</h2>
                    <a class="button items-button" href="items/" alt="link to items">구경하러 가기</a>
                </div>
                <img id="landing-image" src="images/Img_home_top.png" alt="Landing Image">
            </div>
        </section>
        <section id="intro">
            <div class="intro-items">
                <img class="intro-image" src="images/Img_home_01.png" alt="Hot Item">
                <div class="intro-description">
                    <p class="intro-tag">Hot item</p>
                    <div class="text-container">
                        <p class="intro-title">인기 상품을<br>확인해 보세요</p>
                        <p class="intro-text">가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해보세요</p>
                    </div>
                </div>
            </div>
            <div class="intro-items reverse">
                <img class="intro-image" src="images/Img_home_02.png" alt="Search">
                <div class="intro-description right-align">
                    <p class="intro-tag">Search</p>
                    <div class="text-container">
                        <p class="intro-title">구매를 원하는<br>상품을 검색하세요</p>
                        <p class="intro-text">구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요</p>
                    </div>
                </div>
            </div>
            <div class="intro-items">
                <img class="intro-image" src="images/Img_home_03.png" alt="Register">
                <div class="intro-description">
                    <p class="intro-tag">Register</p>
                    <div class="text-container">
                        <p class="intro-title">판매를 원하는<br>상품을 등록하세요</p>
                        <p class="intro-text">어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</p>
                    </div>
                </div>
            </div>
        </section>
        <section id="bottom">
            <span id="bottom-contents">
                <p id="bottom-text">믿을 수 있는<br>판다마켓 중고 거래</p>
                <img id="bottom-image" src="images/Img_home_bottom.png" alt="Bottom Image">
            </span>
        </section>
    </main>
    <footer>
        <div class="footer-item">
            <p id="copyright">©codeit - 2024</p>
        </div>
        <div class="footer-item">
            <a class="link" href="privacy/" alt="link to privacy page">Privacy Policy</p>
            <a class="link" href="faq/" alt="link to FAQ page">FAQ</p>
        </div>
        <div id="sns-container">
            <img class="sns-button" src="images/ic_facebook.png" href="https://www.facebook.com/" alt="link to facebook" target="_blank"/>
            <img class="sns-button" src="images/ic_twitter.png" href="https://x.com/PandaMarket" alt="link to twitter" target="_blank"/>
            <img class="sns-button" src="images/ic_youtube.png" href="https://www.youtube.com/" alt="link to youtube" target="_blank"/>
            <img class="sns-button" src="images/ic_instagram.png" href="https://www.instagram.com/" alt="link to instagram" target="_blank"/>
        </div>
    </footer>
</body>
</html>
