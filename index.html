<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="headerwrapper">
        <img src="images/logo.png" alt="판다마켓 로고" class="logoimg" />
        <div class="loginbtn">로그인</div>
      </div>
    </header>
    <div class="banner-top">
      <div class="bannerwrapper">
        <div class="banner-top-items">
          <div class="slogan">
            일상의 모든 물건을<br />
            거래해 보세요
          </div>
          <div class="surfbtn">구경하러 가기</div>
        </div>
        <img
          src="images/banner-top.png"
          alt="상단 배너 이미지"
          class="banner-top-img"
        />
      </div>
    </div>
    <div class="hot_item">
      <div id="wrapper">
        <img src="images/hot_item.png" alt="인기 상품 이미지" id="main-img" />
        <div class="texts">
          <div class="title_en">Hot item</div>
          <div class="title_ko">
            <div class="title_ko-big">
              인기 상품을<br />
              확인해 보세요
            </div>
            <div class="title_ko-small">
              가장 HOT한 중고거래 물품을 판다 마켓에서 확인해 보세요
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="search">
      <div id="wrapper">
        <div class="texts righttext">
          <div class="title_en">Search</div>
          <div class="title_ko">
            <div class="title_ko-big">
              구매를 원하는<br />
              상품을 검색하세요
            </div>
            <div class="title_ko-small">
              구매하고 싶은 물품은 검색해서 <br />쉽게 찾아보세요
            </div>
          </div>
        </div>
        <img src="images/search.png" alt="검색 이미지" id="main-img" />
      </div>
    </div>
    <div class="register">
      <div id="wrapper">
        <img src="images/register.png" alt="등록 이미지" id="main-img" />
        <div class="texts">
          <div class="title_en">Register</div>
          <div class="title_ko">
            <div class="title_ko-big">
              판매를 원하는<br />
              상품을 등록하세요
            </div>
            <div class="title_ko-small">
              어떤 물건이든 판매하고 싶은 상품을<br />쉽게 등록하세요
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="space"></div>
    <div class="banner-bottom">
      <div class="bannerwrapper">
        <div class="banner-bottom-items">
          <div class="slogan">
            믿을 수 있는<br />
            판다마켓 중고 거래
          </div>
        </div>
        <img
          src="images/banner-bottom.png"
          alt="하단 배너 이미지"
          class="banner-bottom-img"
        />
      </div>
    </div>
    <footer>
      <div class="footer-wrapper">
        <div>ⓒcodeit - 2025</div>
        <div class="info">
          <div>Privacy Policy</div>
          <div>FAQ</div>
        </div>
        <div class="icons">
          <div id="facebook">
            <img src="images/facebookicon.png" alt="페이스북 아이콘" />
          </div>
          <div id="twitter">
            <img src="images/twittericon.png" alt="트위터 아이콘" />
          </div>
          <div id="youtube">
            <img src="images/youtubeicon.png" alt="유튜브 아이콘" />
          </div>
          <div id="instagram">
            <img src="images/instagramicon.png" alt="인스타그램 아이콘" />
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
