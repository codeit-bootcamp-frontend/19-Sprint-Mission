<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판다마켓</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css" />
</head>
<body>
    <!--헤더영역-->
    <header class="header">
        <div class="header-container">
            <a href="/" class="header-logo">
                <img src="images/header-logo.png" alt="로고 이미지">
            </a>
            <a href="/login" class="header-login-btn">
                로그인
            </a>
        </div>
    </header>

    <!--랜딩 영역--> 
    <section class="landing" id="landing">
        <div class="landing-container">
            <div class="landing-info">
                <h1 class="section-title">
                    일상의 모든 물건을<br>거래해보세요
                </h1>
                <a href="/items" class="landing-btn">
                    구경하러 가기
                </a>
            </div>
             <img src="images/landing.png" class="landing" alt="랜딩 이미지">
        </div>
    </section>

    <!--서비스 소개 영역-->
    <section class="featured">
        <div class="featured-container left">
            <img src="images/featured-hot-item.png" class="featured-hot-item" alt="">
            <div class="featured-info left">
                <p class="section-badge">
                    Hot item
                </p>
                <h2 class="section-sub-title">
                    인기 상품을<br>확인해 보세요
                </h2>
                <p class="section-description">
                    가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요
                </p>
            </div>
        </div>
   
        <div class="featured-container right">
             <img src="images/featured-search.png" class="featured-search" alt="">
            <div class="featured-info right">
                <p class="section-badge">
                    Search
                </p>
                <h2 class="section-sub-title">
                    구매를 원하는<br>상품을 검색하세요
                </h2>
                <p class="section-description">
                    구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요
                </p>
            </div>
        </div>
      
        <div class="featured-container left">
            <img src="images/featured-register.png" class="featured-register" alt="">
            <div class="featured-info left">
                <p class="section-badge">
                    Register
                </p>
                <h2 class="section-sub-title">
                    판매를 원하는<br>상품을 등록하세요
                </h2> 
                <p class="section-description">
                    어떤 물건이든 판매하고 싶은<br>상품을 쉽게 등록하세요
                </p>
            </div>
        </div>

        <div class="keyvisual">
            <div class="keyvisual-container">
                <div class="keyvisual-info">
                    <h2 class="section-sub-title">
                        믿을 수 있는<br>판다마켓 중고 거래
                    </h2>
                </div>
            <img src="images/keyvisual.png" class="keyvisual-img" alt="">
        </div>
        
    </section>

    <!--푸터 영역-->
    <footer class="footer">
        <div class="footer-container">
             <div class="footer-bottom">
                <p class="footer-copyright">
                ©codeit - 2024
                </p>
            </div>
            <nav class="footer-menu">
                <ul>
                    <li><a href="/privacy">
                        Privacy Policy</a>
                    </li>
                    <li><a href="/faq">
                        FAQ</a>
                    </li>
                </ul>
            </nav>
            <div class="footer-social-icons">
                <a href="https://www.facebook.com" target="_blank">
                    <img src="images/ic_facebook.png" alt="Facebook">
                </a>
                <a href="https://twitter.com" target="_blank">
                    <img src="images/ic_twitter.png" alt="Twitter">
                </a>
                <a href="https://www.youtube.com" target="_blank">
                    <img src="images/ic_youtube.png" alt="YouTube">
                </a>
                <a href="https://www.instagram.com" target="_blank">
                    <img src="images/ic_instagram.png" alt="Instagram">
                </a>
                </div>
        </div>
    </footer>
</body>
</html>
