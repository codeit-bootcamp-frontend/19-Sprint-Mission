<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="./"><img src="images/main-logo.png" alt="판다마켓 로고" class="header__logo" /></a>
      <a href="./pages/login.html" class="header__login-button flex-center">로그인</a>
    </div>
  </header>
  <main class="flex-center flex-column">
    <section class="hero visual-section">
      <div class="container">
        <div class="hero__content">
          <h1>일상의 모든 물건을 거래해 보세요</h1>
          <a href="./" class="flex-center">구경하러 가기</a>
        </div>
        <img src="images/ad-img.png" class="hero__image" alt="hero 이미지"/>
      </div>
    </section>
    <section class="features">
      <div class="container card-container">
        <div class="card flex-center">
          <img src="images/main3.png" alt="Hot item" />
          <div class="card__contents">
            <h1>Hot item</h1>
            <h2 class="card__subtitle-hotItem">인기 상품을 확인해 보세요</h2>
            <p>가장 HOT한 중고거래 물품을 판다 마켓에서 확인해 보세요</p>
          </div>
        </div>
      </div>
      <div class="container card-container">
        <div class="card flex-center reverse">
          <img src="images/main1.png" alt="search img"/>
          <div class="card__contents">
            <h1>Search</h1>
            <h2>구매를 원하는<span>상품을 검색하세요</span></h2>
            <p class="card__contents-searchDetail">구매하고 싶은 물품은 검색해서 쉽게 찾아보세요</p>
          </div>
        </div>
      </div>
      <div class="container card-container">
        <div class="card flex-center card__register">
          <img src="images/main2.png" alt="register img" />
          <div class="card__contents">
            <h1>Register</h1>
            <h2 class="card__subtitle">판매를 원하는<span>상품을 등록하세요</span></h2>
            <p class="card__contents-RegisterDetail">어떤 물건이든 판매하고 싶은 상품을 쉽게 등록하세요</p>
          </div>
        </div>
      </div>
    </section>
    <div class="divider"></div>
    <section class="closing-section visual-section">
      <div class="closing-section__content container">
        <h1>믿을 수 있는<span>판다마켓 중고 거래</span></h1>
        <img src="images/ad-img2.png" alt="광고 이미지"/>
      </div>
    </section>
  </main>
  <footer>
    <div class="container footer-container">
      <span>©codeit - 2024</span>
      <ul class="footer-links">
        <li><a href="pages/privacy-policy.html">Privacy Policy</a></li>
        <li><a href="pages/faq.html">FAQ</a></li>
      </ul>
      <ul class="footer-links sns">
        <li><a href="https://facebook.com/"><img src="images/sns_images/ic_facebook.png" alt="Facebook" /></a></li>
        <li><a href="https://twitter.com/"><img src="images/sns_images/ic_twitter.png" alt="Twitter" /></a></li>
        <li><a href="https://youtube.com/"><img src="images/sns_images/ic_youtube.png" alt="YouTube" /></a></li>
        <li><a href="https://instagram.com/"><img src="images/sns_images/ic_instagram.png" alt="Instagram" /></a></li>
      </ul>
    </div>
  </footer>
</body>
</html>
