<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 <header class="panda_header">
    <div class="panda_sub_header">
      <span class="header-inner"></span>
      <a href="/"><img src="image/pandlogo.png" alt="판다마켓_로고"></a>
    </div>
      <a href="/login" class="login-link">로그인</a>
  </header>

  <main>
    <section class="hero">
      <img src="image/image.png" alt="구매">
      <span class="hero_text">
      <h1>일상의 모든 물건을<br> 
      거래해 보세요</h1>
      <div class="hero_btn">
      <a href="/items" class="btn">구경하러 가기</a>
      </span>  
    </div>
    </section>

    <section class="hot-items">
      <img src="image/section.png" alt="인기상품">
      <div class="hot-items_text">
        <h2 class="hot-items_text2">Hot Item</h2>
        <h3 class="hot-items_text3">인기 상품을<br>
        확인해보세요</h3>
        <p class="hot-items_text4">가장 HOT한 중고거래 물품을<br>
            판다 마켓에서 확인해 보세요</p>
      </div>
    </section>

    <section class="search">
      <img src="image/search.png" alt="검색">
      <div class="search_text">
        <h2 class="search_text2">Search</h2>
        <h3 class="search_text3">구매를 원하는<br>
        상품을 검색하세요</h3>
        <p class="search_text4">구매하고 싶은 물품은 검색해서<br>
          쉽게 찾아보세요</p>
      </div>
    </section>

    <section class="Register">
      <img src="image/trust.png" alt="판매">
      <div class="Register_text">
        <h2 class="Register_text2">Register</h2>
        <h3 class="Register_text3">판매를 원하는<br>
        상품을 등록하세요</h3>
        <p class="Register_text4">어떤 물건이든 판매하고 싶은 상품을<br>
          쉽게 등록하세요</p>
    </section>

    <section class="turst">
        <img src="image/botoomimg.png" alt="신뢰">
        <div>
        <h3 class="turst_text">믿을 수 있는<br>
        판다마켓 중고 거래<h3>
    </section>
    </main>

  <footer>
    <div class="footer">
      <p class="footer0">@codeit - 2024</p>
      <nav>
        <a href="/privacy" class="footer1">Privacy Policy</a>
        <a href="/faq" class="footer2">FAQ</a>
      </nav>
      <div class="sns_icons">
        <a href="https://facebook.com/" target="_blank"><img src="/image/sns_icon/facebookicon.png" alt="Facebook"></a>
        <a href="https://twitter.com/" target="_blank"><img src="/image/sns_icon/twitericon.png" alt="Twitter"></a>
        <a href="https://youtube.com/" target="_blank"><img src="/image/sns_icon/youtubeicon.png" alt="YouTube"></a>
        <a href="https://instagram.com/" target="_blank"><img src="/image/sns_icon/instaicon.png" alt="Instagram"></a>
      </div>
    </div>
  </footer>
