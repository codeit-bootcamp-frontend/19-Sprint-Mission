<body>
  <header>
      <div class="header wrap">
          <div class="site-logo">
              <img src="images/panda_logo_small.png" alt="판다마켓로고">

      </div>
  </header>
  <main>
      <section class="home-top">
        <div class="home-top-inside wrap">
          <div class="home-top-explain">
            <div class="topic">일상의 모든 물건을<br>거래해보세요</div>

              <a href="/items">구경하러 가기</a>

          </div>
          <img src="images/Img_home_top.png">
        </div>
      </section>
      <section class="home-mid">
        <div class="home-mid-inside mid-wrap">
          <img src="images/Img_home_01.png">
          <div class="home-mid-explain">
            <div class="home-mid-explain-top">Hot item</div>
            <div class="home-mid-explain-mid topic">인기 상품을<br>확인해 보세요</div>

        </div>

      <section class="home-mid">

          <div class="home-mid-explain right">

          </div>
          <img src="images/Img_home_02.png">
        </div>
      </section>
      <section class="home-mid last">
        <div class="home-mid-inside mid-wrap">
          <img src="images/Img_home_03.png">
          <div class="home-mid-explain">
            <div class="home-mid-explain-top">Register</div>
            <div class="home-mid-explain-mid topic">판매를 원하는<br>상품을 등록하세요</div>

          </div>
        </div>
      </section>
      <section class="home-bottom">
        <div class="home-bottom-inside wrap">
          <div class="home-bottom-explain">
            <div class="topic">믿을 수 있는<br>판다마켓 중고 거래</div>
          </div>
          <img src="images/Img_home_bottom.png">
