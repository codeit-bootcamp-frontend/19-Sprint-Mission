<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
</head>
    <header>
        <div class="logo">
            <a href="/">
                <img src="./images/logo/logo.png" alt="로고png">
            </a>
        </div>
        <a id="login-button" class="button" href="/login.html">로그인</a>
    </header>
    <main>
        <section class="banner">
            <div class="banner-content">
                <div class="bgtext">
                    일상의 모든 물건을<br />
                    거래해 보세요
                </div>
                <a class="button pill-button" href="/items">
                    구경하러 가기
                </a>
            </div>
            <img 
                src="./images/home/img_home_top.png"
                alt="상단 배너 그림"
                class="banner-image"
            />
        </section>

        <section id="features" class="wrapper">
            <div class="feature">
                <div class="feature-content">
                    <img src="./images/home/img_home_01.png" alt="판다 둘">
                    <div class="feature-text">
                        <div class="feature-tag">Hot item</div>
                        <div class="bgtext">
                            인기 상품을<br />
                            확인해보세요
                        </div>
                        <div class="feature-discription">
                            가장 HOT한 중고거래 물품을<br/> 
                            판다 마켓에서 확인해 보세요
                        </div>
                    </div>
                </div>
            </div>
            <div class="feature">
                <div class="feature-content"> 
                    <div class="feature-text text-right">
                        <div class="feature-tag">Search</div>
                        <div class="bgtext">
                            구매를 원하는<br />
                            상품을 검색하세요
                        </div>
                        <div class="feature-discription">
                            구매하고 싶은 물품은 검색해서
                            <br/>쉽게 찾아보세요
                        </div>
                    </div>
                    <img src="./images/home/img_home_02.png" alt="돋보기">
                </div>
            </div>
            <div class="feature">
                <div class="feature-content">
                    <img src="./images/home/img_home_03.png" alt="나열된 상품 그림" class="">
                    <div class="feature-text">
                        <div class="feature-tag">Register</div>
                        <div class="bgtext">
                            판매를 원하는<br />
                            상품을 등록하세요
                        </div>
                        <div class="feature-discription">
                            어떤 물건이든 판매하고 싶은 상품을<br />
                            쉽게 등록하세요
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="banner">
            <div class="bottom-banner"> 
                <div id="banner-bgtext" class="bgtext">
                    믿을 수 있는 <br/>
                    판다마켓 중고 거래
                </div>
                <img 
                    src="./images/home/img_home_bottom.png" 
                    alt="하단 배너 그림"
                    class="banner-image"
                />
            </div>
        </section>
    </main>
    <footer id="footerMenu">
        <div class="copyright">
            &copy;codeit - 2024
        </div>
        <div class="ask">
            <a href="/privacy">Privacy Policy</a>
            <a href="/fqa">FAQ</a>
        </div>
        <div id="socialMedia">
            <a href="https://www.facebook.com/?locale=ko_KR" target="_blank">
                <img src="./images/social/ic_facebook.png" alt="페이스북 로고png">
            </a>
            <a href="https://x.com/login?lang=ko" target="_blank">
                <img src="./images/social/ic_twitter.png" alt="트위터 로고">
            </a>
            <a href="https://www.youtube.com/?app=desktop&hl=ko&gl=KR" target="_blank">
                <img src="./images/social/ic_youtube.png" alt="유튜브 로고">
            </a>
            <a href="https://www.instagram.com/" target="_blank">
                <img src="./images/social/ic_instagram.png" alt="인스타그램 로고">
            </a>
        </div>

    </footer>

</html>
