<!DOCTYPE html>
<html lang="ko">
<head>
    <title>판다마켓</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <span class="header-items">
            <a href="index.html">
                <picture>
                    <source media="(max-width: 767px)" srcset="images/logo_mobile.png"/>
                    <img  class="logo" src="images/logo.png" alt="logo">
                </picture>
            </a>
            <a class="button login-button" href="login/">로그인</a>
        </span>
    </header>
    <main>
        <section class="top">
            <div class="top-contents">
                <div class="top-description">
                    <h1 class="top-title">일상의 모든 물건을 거래해 보세요</h2>
                    <a class="button items-button" href="items/">구경하러 가기</a>
                </div>
                <img class="top-image" src="images/Img_home_top.png" alt="top Image">
            </div>
        </section>
        <section class="intro">
            <div class="intro-items">
                <img class="intro-image" src="images/intro-hot-item.png" alt="Hot Item">
                <div class="intro-description">
                    <span class="intro-tag">Hot item</span>
                    <div class="text-container">
                        <span class="intro-title">인기 상품을<br>확인해 보세요</span>
                        <span class="intro-text">가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해보세요</span>
                    </div>
                </div>
            </div>
            <div class="intro-items reverse">
                <img class="intro-image" src="images/intro-search.png" alt="Search">
                <div class="intro-description right-align">
                    <span class="intro-tag">Search</span>
                    <div class="text-container">
                        <span class="intro-title">구매를 원하는<br>상품을 검색하세요</span>
                        <span class="intro-text">구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요</span>
                    </div>
                </div>
            </div>
            <div class="intro-items">
                <img class="intro-image" src="images/intro-register.png" alt="Register">
                <div class="intro-description">
                    <span class="intro-tag">Register</span>
                    <div class="text-container">
                        <span class="intro-title">판매를 원하는<br>상품을 등록하세요</span>
                        <span class="intro-text">어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</span>
                    </div>
                </div>
            </div>
        </section>
        <section class="bottom">
            <span class="bottom-contents">
                <span class="bottom-text">믿을 수 있는<br>판다마켓 중고 거래</span>
                <img class="bottom-image" src="images/Img_home_bottom.png" alt="Bottom Image">
            </span>
        </section>
    </main>
    <footer>
        <div class="footer-item-container">
            <div class="footer-item">
                <span class="copyright">©codeit - 2024</span>
            </div>
            <div class="footer-item">
                <a class="link" href="privacy/" >Privacy Policy</a>
                <a class="link" href="faq/" >FAQ</a>
            </div>
            <div class="sns-container">
                <img class="sns-button" src="images/ic_facebook.png" href="https://www.facebook.com/" target="_blank"/>
                <img class="sns-button" src="images/ic_twitter.png" href="https://x.com/PandaMarket" target="_blank"/>
                <img class="sns-button" src="images/ic_youtube.png" href="https://www.youtube.com/" target="_blank"/>
                <img class="sns-button" src="images/ic_instagram.png" href="https://www.instagram.com/" target="_blank"/>
            </div>
        </div>
    </footer>
</body>
</html>
