 <!DOCTYPE html>
 <html lang="ko">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css">
  <title>판다마켓 회원가입 페이지</title>
 </head>
 
 <body>
  <header>
    <div class="logo">
      <a href="./"><img src="asset/logo/Property 1=lg.svg"></a>
    </div>
  </header>
  <main>
    <form>
      <div>
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="codeit@email.com">
      </div>
      <div>
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" placeholder="판다">
      </div>
      <div>
        <label for="password">비밀번호</label>
        <div class="password-box">
          <input type="password" id="password" placeholder="●●●●●●●●">
          <img class="eye-icon" src="asset/etc/btn_visibility_off_24px.svg">
        </div>
      </div>
      <div>
        <label for="password-check">비밀번호 확인</label>
        <div class="password-box">
          <input type="text" id="password-check" placeholder="asdffff">
          <img class="eye-icon" src="asset/etc/btn_visibility_on_24px.svg">
        </div>

      </div>
      <div class="login-button">
        <input type="submit" value="회원가입">
      </div>
      <div class="social-login">
        <div>간편 로그인하기</div>
        <div class="sns-icon">
          <a href="https://www.google.com/"><img src="asset/sns-icon/ic_google.svg"></a>
          <a href="https://www.kakaocorp.com/page/"><img src="asset/sns-icon/ic_kakao.svg"></a>
        </div>
      </div>
    </form>
    <div class="signup">이미 회원이신가요?&nbsp;<span><a href="login.html">로그인</a></span></div>
  </main>
 </body>
 </html>
