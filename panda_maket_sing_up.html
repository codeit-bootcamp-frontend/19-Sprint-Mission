<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="panda_maket_sing_up.css" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <title>판다마켓_회원가입</title>
</head>

<body>

  <!-- //판다마켓 로고// -->

  <header>
    <div class="logo_img">
      <a href="panda_maket_main.html"><img src="img_panda/login_logo.png" alt="판다마켓_로그인"></a>
    </div>
  </header>


  <main>

    <form>

      <!-- 이메일 -->
      <div class="input.email">
        <label for="email">이메일</label>
        <input id="email" name="email" type="email">
      </div>

      <!-- 닉네임 -->
      <div class="input.nickname">
        <label for="nickname">닉네임</label>
        <input id="nickname" name="nickname" type="text">
      </div>

      <!-- 비밀번호 -->
      <div class="input.password">
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password">
      </div>

      <!-- 비밀번호 확인 -->
      <div class="input.password_check">
        <label for="password">비밀번호 확인</label>
        <input id="password" name="password" type="password">
      </div>

    </form>

    <!-- 회원가입 -->
    <div class="login_button">회원가입</div>

    <!-- 간편 로그인하기 -->
    <div class="Easy_login">
      <div class="Easy_login_inner">
        <div class="Easy_login_menu">간편 로그인하기</div>
      </div>

      <div class="Easy_login_logo">
        <a href="https://www.google.com/"><img class="herf_logo" src="img_panda/Component 2.png" alt="Google_로고"></a>
        <a href="https://www.kakaocorp.com/page/"><img class="herf_logo" src="img_panda/Component 3.png"
            alt="Kakao_로고"></a>
      </div>
    </div>
    </div>


    <div class="already_member_text">
      이미 회원이신가요?
      <a class="sign_up" href="panda_maket_login.html">로그인</a>
    </div>

  </main>

</body>

</html>
