<!DOCTYPE html>
<html lang="ko">
<head>

  <title>판다마켓</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

      <div class="header wrap">
          <div class="site-logo">

            <div>일상의 모든 물건을<br>거래해보세요</div>

          <img src="images/Img_home_top.png" alt="home-top">

      <section class="home-mid">
        <div class="home-mid-inside wrap">
          <img src="images/Img_home_01.png">
          <div class="home-mid-explain"></div>
        </div>
      </section>
      <section class="home-mid">
        <div class="home-mid-inside wrap">
          <img src="images/Img_home_02.png">
          <div class="home-mid-explain"></div>
        </div>
      </section>
      <section class="home-mid">
        <div class="home-mid-inside wrap">
          <img src="images/Img_home_03.png">

  <footer>
