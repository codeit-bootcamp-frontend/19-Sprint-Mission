<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
      <div class="header wrap">
          <div class="site-logo">
              <img src="images/panda_logo_small.png" alt="판다마켓로고">
              판다마켓
          </div>
          <div class="login-button"><a href="/login">로그인</a></div>
      </div>
  </header>
  <main>
      <section class="home-top">
        <div class="home-top-inside wrap">
          <div class="home-top-explain">
            <div>일상의 모든 물건을<br>거래해보세요</div>
            <div class="home-top-button">
              <a href="#">구경하러 가기</a>
            </div>
          </div>
          <img src="images/Img_home_top.png" alt="home-top">
        </div>
      </section>
      <section class="home-mid">
        <div class="home-mid-inside wrap">
          <img src="images/Img_home_01.png" alt="home-mid-01">
          <div class="home-mid-explain">
            <div class="home-mid-explain-top">Hot item</div>
            <div class="home-mid-explain-mid">인기 상품을<br>확인해 보세요</div>
            <div class="home-mid-explain-bottom">가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요</div>
          </div>
        </div>
      </section>
      <section class="home-mid">
        <div class="home-mid-inside wrap">
          <div class="home-mid-explain">
            <div class="home-mid-explain-top">Search</div>
            <div class="home-mid-explain-mid">구매를 원하는<br>물품을 검색하세요</div>
            <div class="home-mid-explain-bottom">구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요</div>
          </div>
          <img src="images/Img_home_02.png" alt="home-mid-02">
        </div>
      </section>
      <section class="home-mid">
        <div class="home-mid-inside wrap">
          <div class="home-mid-explain">
            <div class="home-mid-explain-top">Register</div>
            <div class="home-mid-explain-mid">판매를 원하는<br>상품을 등록하세요</div>
            <div class="home-mid-explain-bottom">어떤 물건이든 판매하고 싶은 상품을<br>쉽게 둥록하세요</div>
          </div>
          <img src="images/Img_home_03.png" alt="home-mid-03">
        </div>
      </section>
      <section class="home-bottom">
        <div class="home-bottom-inside wrap">
          <div class="home-bottom-explain">
            <div>믿을 수 있는<br>판다마켓 중고 거래</div>
          </div>
          <img src="images/Img_home_bottom.png" alt="home-top">
        </div>
      </section>
  </main>
  <footer>
    <div class="wrap">
      <div class="footer-info">
        <div class="footer-info-left">©codeit - 2024</div>
        <div class="footer-info-mid">
          <!-- <div>Privacy Policy</div>
          <div>FAQ</div> -->
          Privacy Policy FAQ
        </div>
        <div class="footer-info-right">
          This is right space
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
