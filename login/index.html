<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  </head>

  <body>
    <main>
      <div class="main-wrap">
        <!--판다마켓 로고-->
        <div class="title">
          <a href="/"><img src="/images/panda_logo3.png" alt="판다마켓 로고" width="396" height="132"></a>
        </div>
        <!--로그인 폼-->
        <form>
          <div class="input-wrapper email">  
            <label for="user-email">이메일</label>
            <input id="user-email" name="email" type="email" placeholder="이메일" required>
          </div>
          <div class="input-wrapper password">
            <label for="user-password">비밀번호</label>
            <div class="input-image">
              <input id="user-password" name="password" type="password" placeholder="비밀번호">
              <button class="hide-text"><img src="../images/btn_visibility_off_24px.png" ></button>
            </div>
          </div>
          <button>로그인</button>
        </form>
        <!--간편로그인-->
        <div class="login">
          <span>간편 로그인하기</span>
          <div class="pages">
              <a href="https://www.google.com/" target="login"><img src="/images/google_logo/google_logo1.png" alt="구글버튼"></a>
              <a href="https://www.kakaocorp.com/page/" target="login"><img src="/images/kakao_logo/kakao_logo1.png" alt="카카오버튼"></a>
          </div>  
        </div>
        <!--회원가입-->
        <div class="signup">
          판다마켓이 처음이신가요? <a href="../signup/index.html">회원가입</a>
        </div>
      </div>
    </main>
    <script src="./index.js"></script>
  </body>
</html>
