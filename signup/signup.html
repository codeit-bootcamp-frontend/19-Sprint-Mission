<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>회원가입</title>
        <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="signup-container">
            <div class="panda">
                <a href="/"><img src="../images/logo.png" class="panda-logo" alt="판다 로고"></a>
                <h1 class="panda-market">판다마켓</h1>
            </div>
            <div class="signup-menu">
                <form>
                    <div class="email">
                        <span class="email-text">이메일</span>
                        <input class="email-input" name="email" type="email" placeholder="codeit@email.com">
                    </div>
                    <div class="alias">
                        <span class="alias-text">닉네임</span>
                        <input class="alias-input" name="alias" type="alias" placeholder="판다">
                    </div>
                    <div class="password">
                        <span class="password-text">비밀번호</span>
                        <div class="open">
                            <input class="password-input" name="password" type="password" placeholder="●●●●●●●">
                            <img src="../images/closed-Eye.png" class="open-eye" alt="비밀번호 보기 눈 모양 아이콘">
                        </div>
                    </div>
                    <div class="verify-password">
                        <span class="verify-password-text">비밀번호 확인</span>
                        <div class="close">
                            <input class="verify-password-input" name="verify-password" type="verify-password" placeholder="asdff">
                            <img src="../images/open-Eye.png" class="close-eye" alt="비밀번호 숨기기 눈 모양 아이콘">
                        </div>
                    </div>
                </form>
                <span class="signup-button">회원가입</span>
                <div class="easy-login-container">
                    <div class="easy-login">
                        <div class="easy-login-text">간편 로그인하기</div>
                        <div class="web-link">
                            <a href="https://www.google.com/"><img src="../images/google.png" alt="구글 이미지"></a>
                            <a href="https://www.kakaocorp.com/page/"><img src="../images/kakaotalk.png" alt="카카오 이미지"></a>
                        </div>
                    </div>
                </div>
                <div class="user-login">
                    <span>이미 회원이신가요? <a href="../login/login.html" class="login-menu">로그인</a></span>
                </div>
            </div>
        </div>
    </body>
