<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container flex-box header-box">
        <a href="./" class="header-title">
          <img
            class="header-title-img"
            src="images/main-logo.png"
            alt="판다마켓 로고"
          />
        </a>
        <a class="header-loginBtn flex-box" href="pages/login.html">로그인</a>
      </div>
    </header>
    <main>
      <div class="ads">
        <div class="container">
          <div class="ads-content flex-box">
            <span
              >일상의 모든 물건을<br />
              거래해 보세요</span
            >
            <a class="flex-box" href="pages/items.html">구경하러 가기</a>
          </div>
          <img class="ads-img" alt="광고 배너" src="images/ad-img.png" />
        </div>
      </div>
      <div class="card">
        <div class="container">
          <div class="card-content flex-box">
            <img alt="사이트 이용 설명" src="images/main2.png" />
            <div class="card-text">
              <h2>Hot item</h2>
              <p class="card-catchphrase">인기 상품을<br />확인해보세요</p>
              <p class="card-info">
                가장 HOT한 중고거래 물품을<br />
                판다 마켓에서 확인해 보세요
              </p>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="container">
          <div class="card-content flex-box reverse">
            <img alt="사이트 이용 설명" src="images/main1.png" />
            <div class="card-text">
              <h2>Search</h2>
              <p class="card-catchphrase">
                구매를 원하는<br />상품을 검색하세요
              </p>
              <p class="card-info">
                구매하고 싶은 물품은<br />
                검색해서 쉽게 찾아보세요
              </p>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="container">
          <div class="card-content flex-box">
            <img alt="사이트 이용 설명" src="images/main3.png" />
            <div class="card-text">
              <h2>Register</h2>
              <p class="card-catchphrase">
                판매를 원하는<br />상품을 등록하세요
              </p>
              <p class="card-info">
                어떤 물건이든 판매하고 싶은
                <br />상품을 쉽게 등록하세요
              </p>
            </div>
          </div>
        </div>
      </div>
      <div class="ads">
        <div class="container">
          <div class="ads-content flex-box">
            <span
              >믿을 수 있는<br />
              판다마켓 중고 거래</span
            >
          </div>
          <img class="ads-img" alt="광고 배너" src="images/ad-img2.png" />
        </div>
      </div>
    </main>
    <footer>
      <div class="container flex-box">
        <div class="copyright">©codeit - 2024</div>
        <div class="footer-content">
          <a href="pages/privacy-policy.html">Privacy Policy</a>
          <a href="pages/faq.html">FAQ</a>
        </div>
        <div class="footer-sns">
          <div>
            <a href="https://facebook.com" target="_blank"
              ><img alt="페이스북 링크" src="images/sns_images/ic_facebook.png"
            /></a>
            <a href="https://x.com" target="_blank"
              ><img alt="트위터 링크" src="images/sns_images/Vector.png"
            /></a>
            <a href="https://youtube.com" target="_blank"
              ><img alt="유튜브 링크" src="images/sns_images/ic_youtube.png"
            /></a>
            <a href="https://instagram.com" target="_blank"
              ><img
                alt="인스타그램 링크"
                src="images/sns_images/ic_instagram.png"
            /></a>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
