<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./images/favicon.svg" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/auth-style.css" />
    <title>판다마켓 - 로그인</title>
  </head>
  <body>
    <main class="auth-container">
      <a href="/">
        <img src="./images/logo.svg" alt="판다마켓 로고" class="logo-img" />
      </a>
      <form class="auth-form">
        <div class="auth-input-area">
          <label for="email" class="auth-label">이메일</label>
          <input id="email" class="auth-input" type="email" placeholder="이메일을 입력해주세요." />
        </div>
        <div class="auth-input-area">
          <label for="password" class="auth-label">비밀번호</label>
          <div class="password-input-area">
            <input id="password" class="auth-input" type="password" placeholder="비밀번호를 입력해주세요." />
            <!-- TODO: 비밀번호 보거나 가리는 기능 추가 -->
            <button class="show-password-button" type="button">
              <img src="./images/auth/btn_visibility_off.svg" alt="비밀번호 보기" />
            </button>
          </div>
        </div>
        <button type="submit" disabled class="button auth-button">로그인</button>
      </form>
      <div class="sns-login-area">
        <span class="sns-login-text">간편 로그인하기</span>
        <a class="sns-login-link" href="https://www.google.com/" target="_blank" rel="noopener noreferrer">
          <img class="sns-login-img" src="./images/auth/google.png" alt="구글 로그인" />
        </a>
        <a class="sns-login-link" href="https://www.kakaocorp.com/page/" target="_blank" rel="noopener noreferrer">
          <img class="sns-login-img" src="./images/auth/kakao.png" alt="카카오 로그인" />
        </a>
      </div>
      <div class="auth-guide-area">
        <span class="auth-guide-text">판다마켓이 처음이신가요?</span
        ><a class="auth-guide-link" href="./signup.html">회원가입</a>
      </div>
    </main>
  </body>
</html>
