<!DOCTYPE html>

<html lang="ko"> 

<head>
  <meta charset="utf-8">
  <title>판다마켓 로그인 페이지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="main_container">
        <a href="index.html" class="main_logo">
            <img src="login-img/logo.png">
        </a>
        <div class="input_container">
            <div class="input_title">
                이메일
            </div>
            <div>
                <input type="email" class="input_box">
            </div>
        </div>
        <div class="input_container">
            <div class="input_title">
                비밀번호
            </div>
            <div class="password_input">
                <input type="password" class="input_box">
                <img id="password_eye" src="login-img/btn_visibility_off_24px.png">
            </div>
        </div>
        <div class="login_button">
            <button id="login_button">
                로그인
            </button>
        </div>
        <div class="simple_container">
            <div>
                간편 로그인하기
            </div>
            <div class="sns_icons">
                <a href="https://www.google.com/">
                   <img src="login-img/Component 2.png">
                </a>
                <a href="https://www.kakaocorp.com/page/">
                    <img src="login-img/Component 3.png">
                </a>
            </div>
        </div>
        <div class="go_singin">
            판다마켓이 처음이신가요? <a href="singin.html" id="singin">회원가입</a>
        </div>
