	<meta name='twitter:image' content="http://fe19-pandamarket.netlify.app/img/common/pandamarket.png">

	<meta property="og:url" content="http://fe19-pandamarket.netlify.app/">

	<title>판다마켓</title>

	<link rel="Shortcut Icon" href="img/fav/favicon.ico">
	<link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
	<div class="wrap">
		<main class="formWrap">
			<h1 class="logo"><a href="/"><span class="blind">판다마켓</span></a></h1>

			<form class="authForm">
				<div class="iptBox">
					<label for="email">이메일</label>
					<div class="ipt">
						<input id="email" type="email" placeholder="이메일을 입력해 주세요.">
					</div>
				</div>
				<div class="iptBox">
					<label for="pw">비밀번호</label>
					<div class="ipt">
						<input id="pw" type="password" placeholder="비밀번호를 입력해 주세요.">
						<button type="button" class="btnEye"><span class="blind">비밀번호 표시</span></button>
					</div>
				</div>
				<button type="submit" class="btn lg">로그인</button>
			</form>

			<div class="socialBtn">
				<span class="tit">간편 로그인하기</span>
				<div class="btns">
					<a href="https://www.google.com/" target="_blank" rel="noopener noreferrer" title="새창으로 열기"><img src="img/content/btn_google.png" alt="구글 로그인"></a>
					<a href="https://www.kakaocorp.com/page/" target="_blank" rel="noopener noreferrer" title="새창으로 열기"><img src="img/content/btn_kakao.png" alt="카카오톡 로그인"></a>
				</div>
			</div>
			
			<div class="guideBtn">
				<span class="tit">판다마켓이 처음이신가요?</span>
				<a href="/signup" class="btnTxt">회원가입</a>
			</div>
		</main>
	</div>
</body>
</html>
