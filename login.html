<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta http-equiv="Cache-Control" content="no-cache"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인하기</title>
  <link rel="shortcut icon" type="image/x-icon" href="images/logo/favicon.ico">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/form_common.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login_container">
    <a href="/" id="login_logo">
      <img src="images/logo/panda-market-logo.png" alt="판다마켓 홈페이지">
    </a>
    <form id="login_form">
      <div class="input_box">
        <label for="email">이메일</label>
        <input id="login_email" type="email" name="email" placeholder="이메일을 입력해 주세요"/>
      </div>
      <div class="input_box">
        <label for="password">비밀번호</label>
        <div class="input-wrapper">
          <input id="login_password" type="password" name="password" placeholder="비밀번호를 입력해 주세요"/>
          <img
              src="images/input/invisible_input.svg"
              alt="비밀번호 숨기기"
              class="password-toggle"
            />
        </div>
      </div>
      <button type="submit" class="button submitBtn">로그인</button>
    </form>
    <div id="quickLogin_container">
      <p>간편 로그인하기</p>
      <div class="quickLogin_btn_area">
        <a href="https://www.google.com/" target="_blank">
          <img src="images/sns/google-icon.png" alt="구글 로그인">
        </a>
        <a href="https://www.kakaocorp.com/page/" target="_blank">
          <img src="images/sns/kakao-icon.png" alt="카카오톡 로그인">
        </a>
      </div>
    </div>
    <p id="navigateToSignup">
      판다마켓은 처음이신가요?
      <a href="signup.html">회원가입</a>
    </p>
  </div>
  </div>
</body>
</html>
