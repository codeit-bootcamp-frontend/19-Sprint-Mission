<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css"></link>
    <link rel="stylesheet" href="./css/common.css"></link>
    <link rel="stylesheet" href="./css/style.css"></link>
    <title>판다마켓 - 로그인</title>
</head>
<body>
    <div class="wrap">
        <div class="join_area">
            <div class="inner">
                <h1>
                    <a href="/" title="홈 페이지로 이동">
                        <img src="img/join_logo.png" alt="판다마켓 로고 이미지"/>
                    </a>
                </h1>
                <form>
                    <ul class="input_list">
                        <li>
                            <div class="input_group">
                                <label for="join_email">이메일</label>
                                <div class="input_body">
                                    <input type="email" id="join_email" placeholder="이메일을 입력해주세요" title="이메일 입력">
                                </div>
                            </div>
                        </li>
                        <li>
                            <div class="input_group">
                                <label for="password">비밀번호</label>
                                <div class="input_body password">
                                    <input type="password" id="password" placeholder="비밀번호을 입력해주세요" title="비밀번호 입력">
                                    <button type="button" class="password_visibility" aria-label="비밀번호 확인하기"></button>
                                </div>
                            </div> 
                        </li>
                    </ul>
                    <button type="button" class="btn large" title="로그인" disabled>로그인</button>
                </form>
                <div class="easy_login">
                    <strong>간편 로그인하기</strong>
                    <ul>
                        <li>
                            <a href="https://www.google.com" title="구글 페이지로 이동">
                                <img src="img/ico_google.png" alt="구글 아이콘 이미지" />
                            </a>
                        </li>
                        <li>
                            <a href="https://www.kakaocorp.com/page" title="카카오톡 페이지로 이동">
                                <img src="img/ico_kakao.png" alt="카카오톡 아이콘 이미지" />
                            </a>
                        </li>
                    </ul>
                </div>
                <p class="join_desc">
                    판다마켓이 처음이신가요? <a href="signup.html" title="회원가입 페이지로 이동">회원가입</a>
                </p>
            </div>
        </div>
    </div>
    <script>
        const joinArea = document.querySelector('.join_area');

        function focusoutAction(e){

            // 에러 상태 메시지로 전달
            function errorMsg (msg){
                // input에 빨강색 테투리
                e.target.classList.remove('complete');
                e.target.classList.add('error');

                // 기존에 error 메시지가 있으면 삭제
                if(e.target.parentElement.querySelector('span')){
                    e.target.parentElement.querySelector('span').remove();
                }

                // 아래에 이메일을 입력해주세요. 에러메시지
                let span = document.createElement('span');
                span.classList.add('error_text');
                span.textContent = msg;
                e.target.parentElement.append(span);
            }

            // 통과
            function errorComplete(){
                if(e.target.parentElement.querySelector('span')){
                    e.target.parentElement.querySelector('span').remove();
                }
                e.target.classList.remove('error');
                e.target.classList.add('complete');
            }

           
            // 이메일
            if(e.target.type === 'email'){
                //  이메일에 값이 없을 경우
                if(e.target.value.length == 0){
                    errorMsg('이메일을 입력해주세요.');
                }
                // 이메일 형식이 잘못된 경우
                else if(!e.target.checkValidity()){
                    errorMsg('잘못된 이메일 형식입니다.');
                } else {
                   errorComplete()
                }
            }

            // 비밀번호
            if(e.target.type === 'password'){
                // 비밀번호에 값이 없을 경우
                if(e.target.value.length == 0){
                    errorMsg('비밀번호를 입력해주세요');
                // 비밀번호 값이 8자 이하인 경우 
                } else if (e.target.value.length < 8){
                    errorMsg('비밀번호를 8자 이상 입력해주세요.');
                } else {
                    errorComplete();
                }
            }

            // 이메일과 비밀번호 모두 통과된 경우 로그인 활성화
            const inpLength = e.target.closest('.input_list').querySelectorAll('input').length;
            if(e.target.closest('.input_list').querySelectorAll('.complete').length == inpLength){

                // button disabled 삭제
                e.target.closest('.input_list').nextElementSibling.removeAttribute('disabled');

                // 이동 가능한 속성 추가
                e.target.closest('.input_list').nextElementSibling.setAttribute('onclick','location.href="/items.html"')
            } 
            
            // 로그인 비활성화
            else {
                // button disabled 추가
                e.target.closest('.input_list').nextElementSibling.setAttribute('disabled', 'true');

                // 이동 가능한 속성 제거
                e.target.closest('.input_list').nextElementSibling.removeAttribute('onclick');
            }

        }
        joinArea.addEventListener('focusout',focusoutAction);

        // 비밀번호 가려짐 여부 체크
        const passwordVisibilityBtn = document.querySelector('.password_visibility');
        
        function passwordVisibility(e){
            if(!e.target.classList.contains('on')){
                e.target.previousElementSibling.setAttribute('type','text');
                e.target.setAttribute('aria-label','비밀번호 가리기');
            }else {
                e.target.previousElementSibling.setAttribute('type','password');
                e.target.setAttribute('aria-label','비밀번호 확인하기');
            }
            e.target.classList.toggle('on')
        }
        passwordVisibilityBtn.addEventListener('click',passwordVisibility);
    </script>
</body>
</html>
