<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓 : 로그인</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="styles/login.css" />
  </head>
  <body>
    <div class="login">
      <a href="/">
        <img src="/images/logo-big.png" alt="홈 페이지로 돌아가기" />
      </a>
      <div class="login__box">
        <form>
          <label for="user-email">이메일</label>
          <input
            type="email"
            name="emial"
            id="user-email"
            placeholder="codeit@example.com"
          />
        </form>
        <form>
          <label for="user-pwd">비밀번호</label>
          <div class="pwd__wrapper">
            <input type="password" name="pwd" id="user-pwd" />
            <button type="button" class="turn-visible-btn">
              <img src="/images/unvisible.png" alt="비밀번호 표시 버튼" />
            </button>
          </div>
        </form>
        <button type="button" class="login__btn">로그인</button>

        <div class="login-easy">
          <div class="login-easy__wrapper">
            <span>간편 로그인하기</span>

            <ul>
              <li>
                <a href="https://google.com/">
                  <img src="/images/google_icon.png" alt="구글 바로가기" />
                </a>
              </li>
              <li>
                <a href="https://kakaocorp.com/page/">
                  <img src="/images/kakao_icon.png" alt="카카오 바로가기" />
                </a>
              </li>
            </ul>
          </div>
        </div>
        <div class="join">
          <p>판다마켓이 처음이신가요? <a href="/signup.html">회원가입</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
