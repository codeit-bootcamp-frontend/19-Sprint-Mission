<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓-회원가입페이지</title>
  <link rel="stylesheet" href="./css/login.css?=${new Date().getTime()}">
</head>
<body>
  <div class="wrap center">
    <div class="container_login">
      <h1 class="logo">
        <img src="./img/logo_big.png" alt="판다마켓">
      </h1>
      <form action="/login" method="post">
        <div class="input_box">
          <label for="email">이메일</label>
          <input type="text" id="email" name="email" required>
        </div>
        <div class="input_box">
          <label for="password">비밀번호</label>
          <div class="password_box">
            <input type="password" id="password" name="password" required>
            <button type="button" class="password-toggle" id="passwordToggle">눈 아이콘</button>
          </div>
        </div>
        <button type="submit" class="submit">로그인</button>
      </form>
      <div class="login_sns">
        <span>간편 로그인하기</span>
        <div class="btn_wrap">
          <button type="button" class="google">구글</button>
          <button type="button" class="kakao">카카오톡</button>
        </div>
      </div>
      <p class="exception">판다마켓이 처음이신가요?<a href="./signup.html">회원가입</a></p>
    </div>
  </div>
</body>
</html>
