<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판다마켓 - 로그인</title>
    <link rel="stylesheet" href="style/index.css">
    <link rel="stylesheet" href="style/login.css">
     <link rel="stylesheet" href="style/signup.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css" />
  </head>
  <body>

    <!-- 로고 -->
    <main class="login-container">
      <div class="login-logo">
        <a href="index.html">
          <img src="images/login/logo.svg" alt="판다마켓 홈" />
        </a>
      </div>

      <!-- 폼 -->
      <form method="post">
        <div class="login-input-group">
          <label for="email">이메일</label>
          <input id="email" name="email" type="email" placeholder="이메일을 입력해 주세요" />
        </div>

        <div class="login-input-group">
          <label for="password">비밀번호</label>
          <div class="login-input-wrapper">
            <input id="password" name="password" type="password" placeholder="비밀번호를 입력해 주세요" />
            <img src="images/login/eye-invisible.svg" alt="비밀번호 숨김" class="login-toggle-password" />
          </div>
        </div>

        <button type="submit" class="login-btn">로그인</button>
      </form>

      <!-- 간편 로그인 -->
      <section class="login-social">
        <h3>간편 로그인하기</h3>
        <div class="login-social-buttons">
          <a href="https://www.google.com/" target="_blank">
            <img src="images/login/google-logo.png" alt="구글 로그인" width="42" height="42" />
          </a>
          <a href="https://www.kakaocorp.com/page/" target="_blank">
            <img src="images/login/kakao-logo.png" alt="카카오톡 로그인" width="42" height="42" />
          </a>
        </div>
      </section>

      <!-- 로그인 스위치 영역 -->
      <p class="login-switch">
        판다마켓이 처음이신가요? <a href="signup.html">회원가입</a>
      </p>
    </main>
     <script src="script.js" defer></script>
  </body>
</html>
