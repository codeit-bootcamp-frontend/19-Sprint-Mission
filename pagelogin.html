<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="css/import.css">
    <link rel="stylesheet" href="css/loginpage.css">
</head>
<body>
    <section class="login-area login">
        <a href="pagelogin.html" class="login-head">
        <img class="login-panda" src="img/판다 얼굴.png" alt="">
        <h1>판다마켓</h1>
        </a>
        <form action="mainpage.html">
            <label for="">이메일</label>
            <input type="email" id="email"  name="email" class="text push" placeholder="email">
            <label for="">비밀번호</label>
            <div class="password-wrap">
                <input type="password" id="password" name="password" class="text password" placeholder="password">
                <span class="eye-ikon eye-on"></span>
                <span class="eye-ikon eye-off"></span>
            </div>
            <input type="submit" id="submit " class="submit push" value="로그인">
        </form>
        
        <div class="easy-login">
            <span>간편 로그인하기</span>
            <a href="https://www.google.com/" class="google"></a>
            <a href="https://www.kakaocorp.com/page/" class="kakao"></a>
        </div>
        <p>판다마켓이 처음이신가요?<a href="signup-page.html" class="sign-up">회원가입</a></p>
    </section>
    <script src="js/login.js"></script>
</body>
</html>
