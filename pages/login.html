<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/login.css" />
    <script src="../assets/js/login.js" defer></script>
    <script src="../assets/js/passwordToggle.js" defer></script>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="login-container">
        <div class="login-logo-wrap">
          <div class="logo">
            <a href="./"
              ><img src="../assets/images/logo_lg.svg" alt="판다마켓 로고"
            /></a>
          </div>
        </div>
        <form action="" class="form-wrap">
          <div class="input-group">
            <label for="email" class="input-label">이메일</label>
            <input
              id="email"
              type="email"
              class="input-field"
              aria-describedby="email-error"
              placeholder="이메일을 입력해주세요."
            />
            <p id="email-error" class="input-field-message"></p>
          </div>

          <div class="input-group">
            <label for="password" class="input-label">비밀번호</label>
            <div class="password-input-wrapper">
              <input
                id="password"
                type="password"
                class="input-field"
                aria-describedby="password-error"
                placeholder="비밀번호를 입력해주세요."
              />
              <button
                type="button"
                class="password-toggle"
                aria-label="비밀번호 표시"
              >
                <img
                  id="eyeIcon"
                  src="../assets/images/eye_closed.svg"
                  alt=""
                />
              </button>
              <p id="password-error" class="input-field-message"></p>
            </div>
          </div>
          <button type="submit" class="btn login disabled" disabled>
            로그인
          </button>
        </form>
        <div class="social-login-wrap">
          <div class="social-login-text">간편 로그인하기</div>
          <div class="social-login-icons">
            <ul>
              <li>
                <a href="https://www.google.com" target="_blank">
                  <img src="../assets/images/google.svg" alt="구글" />
                </a>
              </li>
              <li>
                <a href="https://www.kakaocorp.com/" target="_blank">
                  <img src="../assets/images/kakao.svg" alt="카카오톡" />
                </a>
              </li>
            </ul>
          </div>
        </div>
        <div class="signup-link">
          판다마켓이 처음이신가요?
          <a href="./signup.html">회원가입</a>
        </div>
      </div>
    </div>
  </body>
</html>
