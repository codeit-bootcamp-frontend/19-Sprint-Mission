<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/_color.css" />
    <link rel="stylesheet" href="/css/fonts.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/login.css" />
    <script defer src="/js/login.js"></script>
  </head>
  <body>
    <main>
      <form id="login-form" class="login-section">
        <a href="/" class="login-logo">
          <h1>
            <img src="/img/login/login-logo.png" alt="login-logo" />
          </h1>
        </a>
        <ul class="login-contents">
          <li class="form-group">
            <label for="usr-email">이메일</label>
            <input
              id="usr-email"
              type="text"
              placeholder="이메일을 입력해주세요"
            />
            <p id="usr-email-error" class="error hidden"></p>
          </li>
          <li class="form-group">
            <label for="usr-password">비밀번호</label>
            <div class="input-inc-btn">
              <input
                id="usr-password"
                type="password"
                placeholder="비밀번호를 입력해주세요"
              />
              <button
                id="btn-visibility"
                class="btn-visibility off"
                type="button"
              ></button>
            </div>
            <p id="usr-password-error" class="error hidden"></p>
          </li>
          <li class="li-button">
            <button id="btn-login" disabled type="submit">로그인</button>
          </li>
          <li class="li-sns">
            <h5>간편 로그인하기</h5>
            <div class="login-sns-wrap">
              <a href="https://www.google.com/">
                <img src="/img/login/login-google.png" alt="login-google" />
              </a>
              <a href="https://www.kakaocorp.com/page/">
                <img src="/img/login/login-kakao.png" alt="login-kakao" />
              </a>
            </div>
          </li>
          <li class="li-info">
            <p>판다마켓이 처음이신가요?</p>
            <a href="/pages/signup.html">회원가입</a>
          </li>
        </ul>
      </form>
    </main>
  </body>
</html>
