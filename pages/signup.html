<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/_color.css" />
    <link rel="stylesheet" href="/css/fonts.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <main>
      <section class="login-section">
        <a href="/" class="login-logo">
          <h1>
            <img src="/img/login/login-logo.png" alt="login-logo" />
          </h1>
        </a>
        <ul class="login-contents">
          <li class="li-input">
            <label for="">이메일</label>
            <input type="text" value="codeit@email.com" />
          </li>
          <li class="li-input">
            <label for="">닉네임</label>
            <input type="text" value="판다" />
          </li>
          <li class="li-input">
            <label for="">비밀번호</label>
            <div class="input-inc-btn">
              <input type="password" value="12341234" />
              <button class="btn-visibility"></button>
            </div>
          </li>
          <li class="li-input">
            <label for="">비밀번호 확인</label>
            <div class="input-inc-btn">
              <input type="text" value="12341234" />
              <button class="btn-visibility active"></button>
            </div>
          </li>
          <li class="li-button">
            <a href="#">회원가입</a>
          </li>
          <li class="li-sns">
            <h5>간편 로그인하기</h5>
            <div class="login-sns-wrap">
              <a href="https://www.google.com/">
                <img src="/img/login/login-google.png" alt="login-google" />
              </a>
              <a href="https://www.kakaocorp.com/page/">
                <img src="/img/login/login-kakao.png" alt="login-kakao" />
              </a>
            </div>
          </li>
          <li class="li-info">
            <p>판다마켓이 처음이신가요?</p>
            <a href="/pages/login.html">로그인</a>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
