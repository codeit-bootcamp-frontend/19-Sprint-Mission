<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
     <link rel="stylesheet" href="styles/common.css">
     <link rel="stylesheet" href="styles/signupstyle.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

</head>
<body>
    <main class="paper">
    <header>
        <a href="/"><img class="mbanner" src="logo/panda-market-logo.png" alt=""></a>
    </header>
    <div class="email">
        <span class="label">이메일</span> <br> 
        <input type="text" id="email" placeholder="Codeit@email.com"> 
    </div>

    <div>
        <span class="label">닉네임</span> <br>
        <input type="text" id="nickname" placeholder="닉네임을 입력해 주세요">
    </div>

    <div class="password">
        <span class="label">비밀번호</span> <br>
        <div class="input-wrapper">
            <input type="password" id="pwd" placeholder="비밀번호 입력해 주세요">
            <img class="toggle-password"
              src="input/eye-invisible.png"alt="비밀번호 숨김"/>
        </div>
        <div class="password">
        <span class="label">비밀번호 확인</span> <br>
        <div class="input-wrapper">
            <input type="password" id="pwd" placeholder="비밀번호 입력해 주세요">
             <img class="toggle-password"
              src="input/eye-invisible.png"alt="비밀번호 숨김"/>
        </div>
    </div>
    <div class="login-btn">
        <button type="submit" class="login-btn">로그인</button>
    </div>
    <div class="simplelogin">
        <span class="text">간편 로그인하기</span>
         <div class="icon-group">
            <div>
            <a href="https://accounts.google.com">
            <img class="icon google-icon" src="social/google.png" alt=""></a>
            </div>
            <div>
            <a href="https://www.kakao.com">
            <img class="icon kakao-icon" src="social/KakaoTalk_logo.svg.png" alt=""></a>
            </div>
        </div>
    </div>

    <div class="sign-in">
       <div class="sign-in-text1">
        <span> 이미 회원이신가요?</span>
        </div>
        <div class="sign-in-text2">
        <a class="sign-in-text" href="login.html">로그인</a>
        </div>
    </div>

   </main>
</body>
</html>
