<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../fonts.css">
</head>
<body>
  <div class="login-box">
    <div class = "login-logo">
      <img src="../images/panda_logo_big.svg" alt="logo">
      <div><a href="../index.html">판다마켓</a></div> 
    </div>
    <div class = "login-info">
      <form>
      <div class = "login-email">
        <label for = email>이메일</label>
        <div>
          <input type = "text" id="email" autocomplete="email" placeholder="이메일을 입력해주세요">
        </div>
      </div>
      <div class = "login-nick">
        <label for = nick>닉네임</label>
        <div>
          <input type = "text" id="nick" placeholder="닉네임을 입력해주세요">
        </div>
      </div>
      <div class = "login-pass">
        <label for="pwd">비밀번호</label>
        <div>
          <input type = "password" id="pwd" placeholder="비밀번호를 입력해주세요">
          <button type="button" class = "show-hide-button"></button>
        </div>
      </div>
      <div class = "login-pass-again">
        <label for="pwd-again">비밀번호 확인</label>
        <div>
          <input type = "password" id="pwd-again" placeholder="비밀번호를 다시 한 번 입력해주세요">
          <button type="button" class = "show-hide-button-again"></button>
        </div>
      </div>
      <button type="submit" class = "signup-button" disabled>회원가입</button>
      </form>
      <div class = "login-easy">
        <div>간편 로그인하기</div>
        <div class = "icon">
          <a href="https://www.google.com/" target="_blank" rel="noopener noreferrer"><img src="../images/ic_google.png" alt="google"></a>
          <a href="https://www.kakaocorp.com/page/" target="_blank" rel="noopener noreferrer"><img src="../images/ic_kakao.png" alt="kakao"></a>
        </div>
      </div>
      <div class = "signup-to-login" >
        이미 회원이신가요? <a href="login.html">로그인</a>
      </div>
    </div>
  </div>
  <script type="module" src="index.js"></script>
</body>
</html>
