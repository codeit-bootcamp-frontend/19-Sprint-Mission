<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/link-css/login.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/Pretendard/dist/web/static/pretendard.css"
    />
  </head>

  <body>
    <main class="auth-container">
      <a href="/" class="logo-img">
        <img src="/sprint2_img/loginpanda.png" alt="판다마켓로고"
      /></a>
      <div class="login-frame">
        <form id="loginForm" class="loginForm">
          <!-- 이메일 -->
          <div class="input-item">
            <label for="email">이메일</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="이메일을 입력해 주세요"
              required
              autocomplete="username"
              aria-describedby="emailError"
            />
            <span
              id="emailError"
              class="error-message"
              role="alert"
              aria-hidden="true"
            ></span>
          </div>

          <!-- 비밀번호 -->
          <div class="input-item">
            <label for="password">비밀번호</label>
            <div class="input-wrapper">
              <input
                id="password"
                name="password"
                type="password"
                placeholder="비밀번호를 입력해 주세요"
                required
                autocomplete="current-password"
                aria-describedby="passwordError"
              />
              <button
                type="button"
                class="password-toggle-button"
                aria-label="비밀번호 보이기"
                aria-pressed="false"
              >
                <img
                  class="eyeicon"
                  src="/sprint2_img/Vector.png"
                  alt="눈 아이콘"
                />
              </button>
            </div>
            <span
              id="passwordError"
              class="error-message"
              role="alert"
              aria-hidden="true"
            ></span>
          </div>

          <button type="submit" class="loginBtn">로그인</button>
        </form>

        <div class="simple-login-box">
          <div class="simple-login">간편 로그인하기</div>
          <p class="icon">
            <a href="https://www.google.com/" class="google">
              <img src="/sprint2_img/google.png" alt="구글 아이콘"
            /></a>
            <a href="https://www.kakaocorp.com/page/" class="kakao">
              <img src="/sprint2_img/kakao.png" alt="카카오톡 아이콘"
            /></a>
          </p>
        </div>
        <div class="signup-container">
          <span class="first-pandamarket">판다마켓이 처음이신가요?</span>
          <a href="/link/signup.html" class="signup-link">회원가입</a>
        </div>
      </div>
    </main>
    <script src="/js/auth.js"></script>
  </body>
</html>
