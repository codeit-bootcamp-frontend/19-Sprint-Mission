<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/link-css/signup.css">
  <link rel="stylesheet" href="styles/auth.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/Pretendard/dist/web/static/pretendard.css">
</head>

 <body>
  <main class="auth-container">
  <a href="/" class="logo-img">
      <img src="/sprint2_img/loginpanda.png" alt="판다마켓로고"></a>
      <div class="login-frame">

     <form class="signupForm" id="signupForm" method="post">
        <div class="input-item">  
          <label for ="email">이메일</label>
           <input
            id="email"
            name="email"
            type="email"
            placeholder="이메일을 입력해 주세요"
            required/>
          <span id="emailEmptyError" class="error-message">이메일을 입력해 주세요</span>
          <span id="emailInvalidError" class="error-message">잘못된 이메일 형식입니다</span>
        </div>

        <div class="input-item">
          <label for="nickname">닉네임</label>
          <input
            id="nickname"
            name="nickname"
            type="text"
            placeholder="닉네임을 입력해 주세요"
            required/>
          <span id="nicknameEmptyError" class="error-message">닉네임을 입력해 주세요</span>
        </div>
        
        <div class="input-item">
          <label for="password">비밀번호</label>
          <div class="input-wrapper">
            <input
              id="password"
              name="password"
              type="password"
              placeholder="비밀번호를 입력해 주세요"
              required/>
            <button
              type="button"
              class="password-toggle-button"
              aria-label="비밀번호 보기">
             <img
                class="eyeicon"
                src= "/sprint2_img/btn_visibility_on_24px.png"
                alt="비밀번호 숨김 상태 아이콘"/>
            </button>
          </div>
          <span id="passwordEmptyError" class="error-message">비밀번호를 입력해 주세요</span>
          <span id="passwordInvalidError" class="error-message">비밀번호를 8자 이상 입력해 주세요</span>
        </div>

        <div class="input-item">
          <label for="passwordConfirmation">비밀번호 확인</label>
          <div class="input-wrapper">
            <input
              id="passwordConfirmation"
              name="passwordConfirmation"
              type="password"
              placeholder="비밀번호를 다시 한 번 입력해 주세요"
              required/>
            <button
              type="button"
              class="password-toggle-button"
              aria-label="비밀번호 보기">
              <img
                class="eyeicon"
                src=  "/sprint2_img/btn_visibility_on_24px.png" 
                alt="비밀번호 숨김 상태 아이콘"/>
            </button>
          </div>
          <span id="passwordConfirmationError" class="error-message">비밀번호가 일치하지 않습니다</span>
          </div>
        <button type="submit" name="login" class="loginBtn">회원가입</button>
      </form>
    
        <div class="simple-login-box">
          <div class="simple-login">간편 로그인하기</div>
          <p class="icon">
          <a href="https://www.google.com/" class="google">
            <img src="/sprint2_img/google.png" alt="구글 아이콘"></a>
          <a href="https://www.kakaocorp.com/page/" class="kakao">
            <img src="/sprint2_img/kakao.png" alt="카카오톡 아이콘"></a>
          </p>
        </div>
        <div class="already-member-container"><span class="already-member">판다마켓이 처음이신가요??</span>
          <a href="/link/login.html" class="login-link">회원가입</a></div>
      </div>
    </main> 
      <script src="js/auth.js"></script>
 </body>
</html>
