<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/link-css/signup.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/Pretendard/dist/web/static/pretendard.css">
</head>

 <body>
  <a href="/" class="logo-img">
      <img src="/sprint2_img/loginpanda.png" alt="판다마켓로고"></a>
      <div class="login-frame">
        <form>
          <label for ="email">이메일</label>
          <input id="email" name="email"/>
          <label for="nickname">닉네임</label> 
          <input id="nickname" name="nickname"/>
          <label for ="password">비밀번호</label>
          <div class="input-wrapper">
          <input id="password" name="password"/>
            <img class="eyeicon" src="/sprint2_img/btn_visibility_on_24px.png" alt=" 눈 감은 모양 아이콘">  
          </div>
          <label for ="password-check">비밀번호 확인</label>
          <div class="input-wrapper">
          <input id="password-check" name="password-check"/>
            <img class="eyeicon" src="/sprint2_img/Vector.png" alt=" 눈 감은 모양 아이콘">  
          </div>
          <button>회원가입</button>
        </form>
    
        <div class="simple-login-box">
          <div class="simple-login">간편 로그인하기</div>
          <p class="icon">
          <a href="https://www.google.com/" class="google">
            <img src="/sprint2_img/google.png" alt="구글 아이콘"></a>
          <a href="https://www.kakaocorp.com/page/" class="kakao">
            <img src="/sprint2_img/kakao.png" alt="카카오톡 아이콘"></a>
          </p>
        </div>
        <div class="already-member-container"><span class="already-member">이미 회원이신가요?</span>
          <a href="/link/login.html" class="login-link">로그인</a></div>
      </div>
 </body>
</html>
