<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/link-css/signup.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/Pretendard/dist/web/static/pretendard.css"
    />
  </head>

  <body>
    <main class="auth-container">
      <a href="/" class="logo-img">
        <img src="/sprint2_img/loginpanda.png" alt="판다마켓로고"
      /></a>
      <div class="login-frame">
        <form id="signupForm" class="signupForm">
          <!-- 이메일 -->
          <div class="input-item">
            <label for="email">이메일</label>
            <input
              id="email"
              name="email"
              type="text"
              placeholder="이메일을 입력해 주세요"
              required
              aria-describedby="emailError"
            />
            <span
              id="emailError"
              class="error-message"
              role="alert"
              aria-hidden="true"
            ></span>
          </div>

          <!-- 닉네임 -->
          <div class="input-item">
            <label for="nickname">닉네임</label>
            <input
              id="nickname"
              name="nickname"
              type="text"
              placeholder="닉네임을 입력해 주세요"
              required
              aria-describedby="nicknameError"
            />
            <span
              id="nicknameError"
              class="error-message"
              role="alert"
              aria-hidden="true"
            ></span>
          </div>

          <!-- 비밀번호 -->
          <div class="input-item">
            <label for="password">비밀번호</label>
            <div class="input-wrapper">
              <input
                id="password"
                name="password"
                type="password"
                placeholder="비밀번호를 입력해 주세요"
                required
                aria-describedby="passwordError"
              />
              <button
                type="button"
                class="password-toggle-button"
                aria-label="비밀번호 보이기"
                aria-pressed="false"
              >
                <img
                  class="eyeicon"
                  src="/sprint2_img/btn_visibility_on_24px.png"
                  alt="눈 아이콘"
                />
              </button>
            </div>
            <span
              id="passwordError"
              class="error-message"
              role="alert"
              aria-hidden="true"
            ></span>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="input-item">
            <label for="passwordConfirmation">비밀번호 확인</label>
            <div class="input-wrapper">
              <input
                id="passwordConfirmation"
                name="passwordConfirmation"
                type="password"
                placeholder="비밀번호를 다시 한 번 입력해 주세요"
                required
                aria-describedby="passwordConfirmationError"
              />
              <button
                type="button"
                class="password-toggle-button"
                aria-label="비밀번호 보이기"
                aria-pressed="false"
              >
                <img
                  class="eyeicon"
                  src="/sprint2_img/btn_visibility_on_24px.png"
                  alt="눈 아이콘"
                />
              </button>
            </div>
            <span
              id="passwordConfirmationError"
              class="error-message"
              role="alert"
              aria-hidden="true"
            ></span>
          </div>

          <button type="submit" class="loginBtn">회원가입</button>
        </form>

        <div class="simple-login-box">
          <div class="simple-login">간편 로그인하기</div>
          <p class="icon">
            <a href="https://www.google.com/" class="google">
              <img src="/sprint2_img/google.png" alt="구글 아이콘"
            /></a>
            <a href="https://www.kakaocorp.com/page/" class="kakao">
              <img src="/sprint2_img/kakao.png" alt="카카오톡 아이콘"
            /></a>
          </p>
        </div>
        <div class="already-member-container">
          <span class="already-member">이미 회원이신가요?</span>
          <a href="/link/login.html" class="login-link">로그인</a>
        </div>
      </div>
    </main>
    <script src="/js/auth.js"></script>
  </body>
</html>
