<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/link-css/signup.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/Pretendard/dist/web/static/pretendard.css">
</head>

 <body>
  <a href="/" class="logo-img">
      <img src="/sprint2_img/loginpanda.png" alt="판다마켓로고"></a>
      <div class="login-frame">
        <div class="email">이메일</div>
        <div class="email-box">
          <p class="email-name">codeit@email.com</p>
        </div>
        <div class="nickname">닉네임</div>
        <div class="nickname-box">
          <p class="nickname-name">판다</p>
        </div>
        <div class="password">비밀번호</div>
        <div class="password-box">
          <p class="password-name">000000</p>
          <a class="eyeicon-close">
          <img src="/sprint2_img/btn_visibility_on_24px.png" alt=" 눈 감은 모양 아이콘"></a>
        </div>
        <div class="password-check">비밀번호 확인</div>
        <div class="password-checkbox">
          <p class="password-check-again">asdfff</p>
          <a class="eyeicon-open">
          <img src="/sprint2_img/Vector.png" alt=" 눈 모양 아이콘"></a>
        </div>
        <div class="signup-button">
          <p class="signup">회원가입</p>
        </div>
        <div class="simple-login-box">
          <p class="simple-login">간편 로그인하기</p>
          <p class="icon">
          <a href="https://www.google.com/" class="google">
            <img src="/sprint2_img/google.png" alt="구글 아이콘"></a>
          <a href="https://www.kakaocorp.com/page/" class="kakao">
            <img src="/sprint2_img/kakao.png" alt="카카오톡 아이콘"></a>
          </p>
        </div>
        <div class="already-member-container"><span class="already-member">이미 회원이신가요?</span>
          <a href="/link/login.html" class="login-link">로그인</a></div>
      </div>
 </body>
</html>
