<!DOCTYPE html>
<html lang="ko">
<!-- 문서의 정보(메타데이터) -->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="home.css" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <title>판다마켓</title>
</head>

<body>
  <!-- 로고/제목/메뉴 도입부 -->
  <!-- 판다마켓 / 로그인 -->

  <nav>
    <div class="logo_img">
      <a href="home.html"> <img src="img_panda/logo.png" alt="판다마켓로고" /></a>
    </div>

    <div>
      <a class="login_button button" href="login.html"> 로그인</a>
    </div>
  </nav>

  <!-- 일상의 모든 물건을 거래해 보세요 -->

  <section class="top_header">
    <div class="top_text_box">
      <div class="top_title">일상의 모든 물건을<br>거래해보세요</div>
      <div>
        <a class="top_button button" href="LINK/show.html">구경하러 가기</a>
      </div>
    </div>

    <div class="top_img_box">
      <img class="top_img" src="img_panda/Img_home_top.png" alt="판다마켓상단배너" />
    </div>
  </section>

  <!-- 이미지/텍스트 본문 -->

  <main>
    <!-- 인기 상품을 확인해보세요 -->
    <section class="section_div">
      <div class="section_inner">
        <div class="section_img_box">
          <img src="img_panda/Img_home_01.png" alt="판다마켓소개1" />
        </div>
        <div class="section_text_box">
          <div class="section_tag">Hot item</div>
          <div class="section_title">인기 상품을<br>확인해 보세요</div>
          <div class="section_text">가장 HOT한 중고거래 물품을 판다마켓에서 확인해 보세요</div>
        </div>
      </div>
    </section>

    <section class="section_div">
      <div class="section_inner">

        <div class="section_text_box reverse">
          <div class="section_tag">Search</div>
          <div class="section_title">구매를 원하는<br>상품을 검색하세요</div>
          <div class="section_text">구매하고 싶은 물품은 검색해서 쉽게 찾아보세요</div>
        </div>
        <div class="section_img_box">
          <img src="img_panda/Img_home_02.png" alt="판다마켓소개2" />
        </div>
      </div>
    </section>

    <!-- 판매를 원하는 상품을 등록하세요 -->
    <section class="section_div">
      <div class="section_inner">
        <div class="section_img_box">
          <img src="img_panda/Img_home_03.png" alt="판다마켓소개3" />
        </div>
        <div class="section_text_box">
          <div class="section_tag">Register</div>
          <div class="section_title">판매를 원하는<br>상품을 등록하세요</div>
          <div class="section_text">어떤 물건이든 판매하고 싶은 상품을 쉽게 등록하세요</div>
        </div>
      </div>
    </section>
  </main>

  <!-- 믿을 수 있는 판다마켓 중고거래 -->

  <section class="bottom_header">
    <div class="bottom_text_box">
      <div class="bottom_title">믿을 수 있는<br>판다마켓 중고 거래</div>
    </div>

    <div class="bottom_img_box">
      <img class="bottom_img" src="img_panda/Img_home_bottom.png" alt="판다마켓하단배너" />
    </div>
  </section>

  <!-- codeit - 2024 / FAQ / Logo image -->

  <footer>
    <div class="footer_start">@codeit - 2024</div>

    <div class="footer_center">
      <a href="LINK/Privacy.html">privacy policy</a>
      <a href="LINK/FAQ.html">FAQ</a>
    </div>

    <div class="footer_end">
      <a href="https://www.facebook.com" target="_blank">
        <img src="img_panda/ic_facebook.png" alt="facebook 가기" />
      </a>

      <a href="https://x.com" target="_blank">
        <img src="img_panda/ic_twitter.png" alt="X 가기" />
      </a>

      <a href="https://youtube.com" target="_blank">
        <img src="img_panda/ic_youtube.png" alt="Youtube 가기" />
      </a>

      <a href="https://www.instagram.com" target="_blank">
        <img src="img_panda/ic_instagram.png" alt="instagram 가기" />
      </a>
